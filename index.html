<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>biteScout</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFFFFF">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<!-- Firebase (compat SDK — plain globals, no build step, matches the rest of this app) -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
<style>
  :root{
    --ink:#0F6DBE;
    --ink-soft:#0B5493;
    --chrome:#0F6DBE;
    --gold:#FFC145;
    --chili:#BE4B33;
    --leaf:#19A3DC;
    --paper:#F2F2F2;
    --paper-dim:#EAEAEA;
    --coffee:#1A1A1A;
    --accent:#FF8A00;
    --accent-dim:#FF8A0033;
    --card-bg:#ffffff;
    --radius:18px;
    --r-lg:18px;
    --r-md:20px;
    --r-sm:10px;
    --shadow:0 8px 24px rgba(27,20,10,0.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: #16211c;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:28px 12px;
    font-family:'Plus Jakarta Sans', sans-serif;
  }
  .display{font-family:'Plus Jakarta Sans', sans-serif;}

  /* ===== Splash screen ===== */
  .splash-screen{
    position:fixed;
    inset:0;
    background:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    transition:opacity 0.45s ease;
  }
  .splash-screen img{
    width:62%;
    max-width:300px;
  }
  .splash-screen.hide{
    opacity:0;
    pointer-events:none;
  }

  /* ===== Welcome screen ===== */
  .welcome-screen{
    position:fixed;
    inset:0;
    background:#ffffff;
    z-index:9000;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:48px 28px calc(36px + env(safe-area-inset-bottom));
    transition:opacity 0.4s ease;
  }
  .welcome-screen.hide{
    opacity:0;
    pointer-events:none;
  }
  .welcome-logo-wrap{
    margin-top:24px;
    width:100%;
    display:flex;
    justify-content:center;
  }
  .welcome-logo-wrap img{
    width:68%;
    max-width:280px;
  }
  .welcome-spacer{
    flex:1;
  }
  .welcome-actions{
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .welcome-btn-primary{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:30px;
    padding:15px;
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
  }
  .welcome-btn-outline{
    background:transparent;
    color:var(--accent);
    border:2px solid var(--accent);
    border-radius:30px;
    padding:13px;
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
  }
  .welcome-link{
    background:none;
    border:none;
    color:var(--ink);
    font-family:inherit;
    font-weight:600;
    font-size:14px;
    padding:10px;
    cursor:pointer;
    width:100%;
    text-align:center;
    opacity:0.75;
  }
  .welcome-input{
    width:100%;
    padding:13px 14px;
    border-radius:14px;
    border:1.5px solid #E0E0E0;
    font-family:inherit;
    font-size:14px;
    color:var(--coffee);
    background:#fff;
  }
  .welcome-input:focus{
    outline:none;
    border-color:var(--accent);
  }
  .welcome-auth-error{
    font-size:12.5px;
    color:var(--chili);
    font-weight:600;
    min-height:16px;
    padding:0 2px;
  }
  .welcome-btn-primary:disabled,
  .welcome-btn-outline:disabled{
    opacity:0.6;
    cursor:default;
  }

  /* ===== Onboarding carousel ===== */
  .onboarding-screen{
    position:fixed;
    inset:0;
    background:#ffffff;
    z-index:9500;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 28px calc(28px + env(safe-area-inset-bottom));
    transition:opacity 0.35s ease;
  }
  .onboarding-screen.hide{
    opacity:0;
    pointer-events:none;
  }
  .onboarding-skip{
    position:absolute;
    top:calc(20px + env(safe-area-inset-top));
    right:20px;
    background:none;
    border:none;
    color:#9CA3AF;
    font-family:inherit;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    z-index:1;
  }
  .onboarding-slide-area{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    max-width:340px;
  }
  .onboarding-icon{
    display:flex;
    justify-content:center;
    color:var(--accent);
    margin-bottom:28px;
  }
  .onboarding-headline{
    font-weight:800;
    font-size:20px;
    color:var(--coffee);
    margin-bottom:12px;
  }
  .onboarding-body{
    font-size:14px;
    color:#6B7280;
    line-height:1.6;
  }
  .onboarding-dots{
    display:flex;
    gap:7px;
    margin-bottom:22px;
  }
  .onboarding-dot{
    width:8px;height:8px;
    border-radius:50%;
    background:#E0E0E0;
    transition:all .2s ease;
  }
  .onboarding-dot.active{
    background:var(--accent);
    width:22px;
    border-radius:5px;
  }
  .onboarding-next{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:30px;
    padding:15px;
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
    max-width:340px;
  }

  /* ===== Edge style presets (shape) ===== */
  .phone[data-edge="sharp"]{
    --r-lg:2px;
    --r-md:4px;
    --r-sm:2px;
  }
  .phone[data-edge="half"]{
    --r-lg:9px;
    --r-md:10px;
    --r-sm:6px;
  }
  .phone[data-edge="curved"]{
    --r-lg:18px;
    --r-md:20px;
    --r-sm:10px;
  }

  /* ===== Design style presets (color) ===== */

  /* ===== Phone shell ===== */
  /* Desktop/preview: decorative mockup frame, floating and rounded */
  .phone{
    width:400px;
    max-width:100%;
    background:var(--paper);
    border-radius:38px;
    border:8px solid #1A1A1A;
    box-shadow:var(--shadow), 0 0 0 1px rgba(0,0,0,0.2);
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    height:820px;
  }

  /* Real mobile device: fill the entire viewport, no mockup chrome */
  @media (max-width: 600px){
    body{
      padding:0;
      align-items:stretch;
      background:var(--chrome);
    }
    .phone{
      width:100vw;
      max-width:100vw;
      height:100dvh;
      max-height:100dvh;
      border:none;
      border-radius:0;
      box-shadow:none;
    }
    .topbar{
      padding-top:calc(16px + env(safe-area-inset-top));
    }
    .bottomnav{
      padding-bottom:calc(14px + env(safe-area-inset-bottom));
    }
  }

  /* ===== Top bar ===== */
  .topbar{
    background:var(--chrome);
    color:#fff;
    padding:16px 18px 14px;
    position:relative;
    border-bottom:1px solid rgba(255,255,255,0.12);
    transition:padding .2s ease;
  }
  .topbar.topbar-compact{
    padding:10px 18px 8px;
  }
  .brand-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand-mark{
    width:32px;height:32px;
    border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    overflow:hidden;
    padding:3px;
    box-sizing:border-box;
  }
  .brand-mark img{
    width:100%;
    height:100%;
    object-fit:contain;
  }
  .brand-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;
    font-size:22px;
    letter-spacing:0.2px;
  }
  .settings-gear{
    background:var(--paper-dim);
    color:var(--ink);
    border:none;
    border-radius:50%;
    width:34px;height:34px;
    font-size:15px;
    cursor:pointer;
    flex-shrink:0;
  }

  /* ===== Settings overlay ===== */
  .settings-screen{
    position:fixed;
    inset:0;
    background:var(--paper);
    z-index:9600;
    display:flex;
    flex-direction:column;
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  .settings-screen.hide{
    opacity:0;
    pointer-events:none;
    transform:translateY(12px);
  }
  .settings-header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:calc(20px + env(safe-area-inset-top)) 20px 16px;
    border-bottom:1px solid #E8E4DA;
    flex-shrink:0;
  }
  .settings-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:20px;
    font-weight:700;
    color:var(--coffee);
  }
  .settings-close{
    background:var(--paper-dim);
    border:none;
    border-radius:50%;
    width:32px;height:32px;
    font-size:14px;
    cursor:pointer;
  }
  .settings-body{
    flex:1;
    overflow-y:auto;
    padding:18px 20px calc(28px + env(safe-area-inset-bottom));
  }
  .settings-section{
    margin-bottom:22px;
  }
  .settings-section-title{
    font-size:11px;
    letter-spacing:1.2px;
    text-transform:uppercase;
    color:var(--leaf);
    font-weight:700;
    margin-bottom:8px;
  }
  .settings-row-note{
    font-size:12.5px;
    color:#6B7280;
    line-height:1.5;
  }

  /* ===== Map place detail overlay (opened by tapping the map bottom sheet) ===== */
  .map-detail-screen{
    position:fixed;
    inset:0;
    background:var(--paper);
    z-index:9600;
    display:flex;
    flex-direction:column;
    transition:opacity 0.3s ease, transform 0.3s ease;
  }
  .map-detail-screen.hide{
    opacity:0;
    pointer-events:none;
    transform:translateY(12px);
  }
  .map-detail-header{
    padding:calc(16px + env(safe-area-inset-top)) 16px 12px;
    flex-shrink:0;
  }
  .map-detail-body{
    flex:1;
    overflow-y:auto;
    padding:0 20px calc(28px + env(safe-area-inset-bottom));
  }

  /* ===== Required nickname overlay (shown once, right after sign-up) ===== */
  .nickname-screen{
    position:fixed;
    inset:0;
    background:#fff;
    z-index:9700;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:64px 28px calc(28px + env(safe-area-inset-bottom));
    transition:opacity 0.35s ease;
  }
  .nickname-screen.hide{
    opacity:0;
    pointer-events:none;
  }
  .nickname-heading{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:22px;
    font-weight:700;
    color:var(--coffee);
    text-align:center;
    margin-top:18px;
  }
  .nickname-sub{
    font-size:13px;
    color:#6B7280;
    text-align:center;
    margin-top:8px;
    line-height:1.5;
  }

  /* ===== Upgrade banner ===== */
  .upgrade-banner{
    margin-top:12px;
    background:var(--accent);
    border-radius:var(--r-lg);
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .upgrade-banner p{
    font-size:12px;
    line-height:1.4;
    color:#fdeadc;
  }
  .upgrade-banner strong{ color:#fff; }
  .upgrade-banner button{
    background:var(--card-bg);
    color:var(--accent);
    border:none;
    border-radius:var(--r-md);
    padding:7px 14px;
    font-weight:800;
    font-size:11px;
    white-space:nowrap;
    cursor:pointer;
    font-family:inherit;
  }

  /* ===== Content ===== */
  .content{
    flex:1;
    overflow-y:auto;
    padding:18px 18px 90px;
  }
  .content::-webkit-scrollbar{width:0;}

  .section-eyebrow{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--leaf);
    font-weight:700;
    margin-bottom:4px;
  }
  .section-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:24px;
    font-weight:600;
    color:var(--coffee);
    margin-bottom:16px;
  }

  .kind-filter{
    display:flex;
    gap:6px;
    background:var(--paper-dim);
    border-radius:var(--r-md);
    padding:4px;
    margin-bottom:16px;
  }
  .kind-filter button{
    flex:1;
    border:none;
    background:transparent;
    padding:8px 10px;
    border-radius:var(--r-lg);
    font-family:inherit;
    font-weight:700;
    font-size:12px;
    color:var(--coffee);
    opacity:0.55;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
  }
  .kind-filter button.active{
    background:var(--card-bg);
    opacity:1;
    box-shadow:0 2px 6px rgba(59,42,30,0.12);
  }
  .kind-pill{
    font-size:9.5px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.3px;
    padding:2px 8px;
    border-radius:var(--r-md);
    display:inline-block;
  }
  .kind-pill.food{ background:#FFE1C2; color:var(--accent); }
  .kind-pill.place{ background:#D7EDF8; color:var(--ink); }

  .search-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--card-bg);
    border:1.5px solid #D8D8D8;
    border-radius:var(--r-md);
    padding:10px 14px;
    margin-bottom:14px;
  }
  .search-bar input{
    border:none;
    outline:none;
    flex:1;
    font-family:inherit;
    font-size:13px;
    color:var(--coffee);
    background:transparent;
  }
  .search-ic{ font-size:14px; opacity:0.6; }
  .search-clear{
    border:none;
    background:var(--paper-dim);
    width:20px;height:20px;
    border-radius:50%;
    cursor:pointer;
    font-size:10px;
    color:var(--coffee);
  }
  .place-card.external{
    border:1.5px dashed var(--gold);
    background:#fffdf6;
  }
  .source-pill{
    font-size:9.5px;
    color:#6B7280;
    font-weight:700;
  }
  .flag-badge{
    background:#fbe9df;
    color:var(--chili);
    font-size:11px;
    font-weight:700;
    padding:7px 10px;
    border-radius:var(--r-sm);
    margin:8px 0;
  }
  .btn-ghost.flagged{
    background:var(--chili);
    border-color:var(--chili);
    color:#fff;
  }

  /* ===== Cards ===== */
  .place-card{
    background:var(--card-bg);
    border-radius:var(--r-lg);
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 4px 14px rgba(59,42,30,0.08);
    border:1px solid rgba(59,42,30,0.06);
  }
  .place-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .place-photo{
    width:100%;
    height:110px;
    border-radius:var(--r-sm);
    background:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    color:rgba(255,255,255,0.85);
    font-size:28px;
    margin-bottom:10px;
  }
  .place-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;
    font-size:16.5px;
    color:var(--coffee);
  }
  .place-meta{
    font-size:11.5px;
    color:#6B7280;
    margin-top:2px;
  }
  .tag-row{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .tag{
    background:var(--paper-dim);
    color:var(--coffee);
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:var(--r-md);
  }
  .stars{ color:var(--accent); font-size:13px; letter-spacing:1px; }
  .place-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .btn{
    font-family:inherit;
    font-weight:700;
    font-size:12px;
    border-radius:var(--r-md);
    padding:8px 14px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .btn-primary{ background:var(--accent); color:var(--ink); }
  .btn-ghost{ background:transparent; color:var(--leaf); border:1.5px solid var(--leaf); }
  .btn-locked{ background:#EDEDED; color:#a89a82; cursor:not-allowed; }
  .btn:active{ transform:scale(0.97); }
  .link-btn{
    font-size:11.5px;
    color:var(--leaf);
    text-decoration:underline;
    text-underline-offset:2px;
    background:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-weight:600;
    padding:0;
  }

  /* ===== Cap meter ===== */
  .cap-meter{
    background:var(--card-bg);
    border-radius:var(--r-lg);
    padding:12px 14px;
    margin-bottom:14px;
    border:1px dashed var(--leaf);
  }
  .cap-meter-row{
    display:flex;
    justify-content:space-between;
    font-size:11.5px;
    font-weight:700;
    color:var(--coffee);
    margin-bottom:6px;
  }
  .cap-track{
    height:6px;
    background:var(--paper-dim);
    border-radius:var(--r-sm);
    overflow:hidden;
  }
  .cap-fill{
    height:100%;
    background:var(--accent);
    transition:width .3s ease;
  }
  .cap-fill.full{ background:var(--chili); }

  /* ===== Bottom nav ===== */
  .bottomnav{
    position:absolute;
    bottom:0; left:0; right:0;
    background:var(--chrome);
    display:flex;
    justify-content:space-around;
    padding:10px 6px 14px;
    border-top:1px solid rgba(255,255,255,0.12);
    z-index:2000;
  }
  .navbtn{
    background:none;
    border:none;
    color:#8FAFD1;
    font-family:inherit;
    font-size:10px;
    font-weight:700;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    cursor:pointer;
    padding:4px 8px;
  }
  .navbtn .ic{ display:flex; align-items:center; justify-content:center; height:20px; }
  .navbtn.active{ color:var(--accent); }

  /* ===== Me tab ===== */
  .profile-head{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
  }
  .wallpaper-swatch.upload-swatch{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--paper-dim);
    border:2px dashed #B0B0B0;
    font-size:16px;
    color:var(--coffee);
  }
  .section-eyebrow, .section-title{
    text-shadow:0 1px 3px rgba(255,255,255,0.45);
  }
  .style-swatch-row{
    display:flex;
    gap:10px;
    margin-bottom:8px;
    flex-wrap:wrap;
  }
  .style-swatch{
    padding:8px 14px;
    border-radius:var(--r-md);
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    border:2px solid transparent;
    background:var(--paper-dim);
    color:var(--coffee);
  }
  .style-swatch.selected{
    border-color:var(--coffee);
  }
  .wallpaper-row{
    display:flex;
    gap:10px;
    margin-bottom:8px;
    overflow-x:auto;
    padding-bottom:4px;
  }
  .wallpaper-swatch{
    flex-shrink:0;
    width:56px;height:40px;
    border-radius:var(--r-sm);
    cursor:pointer;
    border:2.5px solid transparent;
  }
  .wallpaper-swatch.selected{
    border-color:var(--coffee);
  }
  .sub-label{
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:#6B7280;
    margin-bottom:6px;
    margin-top:4px;
  }
  .wallpaper-swatch.reset-swatch{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--paper-dim);
    border:2px dashed #B0B0B0;
    font-size:16px;
    color:var(--coffee);
  }

function icon(name, opts){
  opts = opts || {};
  const size = opts.size || 18;
  const color = opts.color || 'currentColor';
  const strokeWidth = opts.strokeWidth != null ? opts.strokeWidth : 2;
  const fill = opts.filled ? color : 'none';
  const inner = ICON_PATHS[name];
  if(!inner) return '';
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="${color}" stroke-width="${strokeWidth}" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;vertical-align:middle;flex-shrink:0;">${inner}</svg>`;
}

/* A row of star icons for rating displays — filled stars inherit the parent's
   text color (so .stars { color: var(--accent) } still works untouched),
   empty stars use a fixed muted gray so they read clearly at a glance. */
function starRow(rating, opts){
  opts = opts || {};
  const size = opts.size || 13;
  const showEmpty = opts.showEmpty !== false;
  const filled = Math.round(rating);
  let html = '';
  for(let i=0;i<filled;i++) html += icon('star', {size, filled:true});
  if(showEmpty){
    for(let i=0;i<5-filled;i++) html += icon('star', {size, filled:false, color:'#C9C4B8'});
  }
  return html;
}

function requestUserLocation(onDone){
  if(!('geolocation' in navigator)){
    state.locationStatus = 'unavailable';
    if(onDone) onDone();
    return;
  }
  state.locationStatus = 'locating';
  navigator.geolocation.getCurrentPosition(
    (pos)=>{
      state.userLocation = { lat: pos.coords.latitude, lng: pos.coords.longitude };
      state.locationStatus = 'granted';
      if(onDone) onDone();
    },
    (err)=>{
      state.locationStatus = 'denied';
      if(onDone) onDone();
    },
    { enableHighAccuracy:true, timeout:8000, maximumAge:60000 }
  );
}

/* Distance in km between two lat/lng points (Haversine formula) */
function distanceKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function formatDistance(km){
  if(km < 1) return Math.round(km*1000) + ' m away';
  return km.toFixed(1) + ' km away';
}

function colorForId(id){
  let hash = 0;
  for(let i=0; i<id.length; i++) hash = (hash * 31 + id.charCodeAt(i)) >>> 0;
  return AVATAR_COLORS[hash % AVATAR_COLORS.length];
}

    snap.forEach(function(doc){

      people.push({

        badge: 'biteScout member',
        color: colorForId(doc.id),
        visits: d.savedCount || 0,
        lat: d.lat, lng: d.lng,

    });
    REAL_PEOPLE = people;
    if(state.tab === 'people') render();
  }).catch(function(err){ console.error('Failed to load member directory', err); });

/* Maps a slider value (0-400) to a colour.
   0-360 = rainbow hue at the given saturation/lightness.
   360-400 = grayscale ramp from white to black. */
function hueValueToColor(value, sat, light){
  if(value <= 360){
    return `hsl(${value}, ${sat}%, ${light}%)`;
  }
  const t = (value - 360) / 40;
  const gray = Math.round(100 - t * 100);
  return `hsl(0, 0%, ${gray}%)`;
}

// render() replaces content.innerHTML wholesale, which destroys and recreates
// any focused <input> — on mobile this drops keyboard focus after every
// keystroke. This wrapper remembers what was focused (and cursor position)
// and restores it immediately after the re-render, so typing stays continuous.
function renderPreservingFocus(){
  const active = document.activeElement;
  const activeId = (active && active.id) ? active.id : null;
  const selStart = (active && typeof active.selectionStart === 'number') ? active.selectionStart : null;
  const selEnd = (active && typeof active.selectionEnd === 'number') ? active.selectionEnd : null;

  render();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        try { el.setSelectionRange(selStart, selEnd); } catch(e){ /* ignore */ }
      }
    }
  }
}

function applyFontColor(shell){
  if(isGuest()){
    shell.style.removeProperty('--coffee');
    return;
  }
  shell.style.setProperty('--coffee', hueValueToColor(state.fontHue, 42, 26));
}

function applyWallpaper(shell){
  if(isGuest() || state.wallpaper === 'none'){
    shell.style.backgroundImage = '';
    shell.style.background = '';
    return;
  }
  if(state.wallpaper === 'custom' && state.customWallpaperUrl){
    shell.style.background = '';
    shell.style.backgroundImage = `url('${state.customWallpaperUrl}')`;
    shell.style.backgroundSize = 'cover';
    shell.style.backgroundPosition = 'center';
    return;
  }
  if(state.wallpaper === 'solid'){
    const lightness = state.bgLightMode === 'dark' ? 22 : 88;
    shell.style.backgroundImage = '';
    shell.style.background = hueValueToColor(state.bgHue, 55, lightness);
    return;
  }
  const preset = WALLPAPERS.find(w=>w.id===state.wallpaper);
  if(preset && preset.css){
    shell.style.backgroundImage = '';
    shell.style.background = preset.css;
  }
}

    saveBtn = `<button class="btn btn-ghost" onclick="toggleSave('${p.id}')">${icon('check',{size:13})} Saved</button>`;
  } else if(isGuest() && used>=cap){
    saveBtn = `<button class="btn btn-locked" onclick="capToast('save')">${icon('lock',{size:13})} Cap reached</button>`;
  } else {
    saveBtn = `<button class="btn btn-primary" onclick="toggleSave('${p.id}')">+ Save</button>`;
  }
  let distPill = '';
  if(state.userLocation){
    const d = distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng);
    distPill = `<span class="distance-pill">${formatDistance(d)}</span>`;
  }
  return `
      <div class="place-card">
        <div class="place-photo">${p.icon}</div>
        <div class="place-top">
          <div>
            <span class="kind-pill ${p.kind}">${p.kind==='food'?'Food':'Place'}</span>${distPill}
            <div class="place-name">${p.name}</div>
            <div class="place-meta">${p.area} · ${p.cat}</div>
          </div>
          <div class="stars">${starRow(p.rating)}</div>
        </div>
        <div class="tag-row">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${flagBadge(p)}
        <div class="place-actions">
          ${saveBtn}
          <button class="btn btn-ghost" onclick="setTab('diary')">${icon('book-open',{size:13})} Diary</button>
          ${linkButton(p)}
        </div>
        <div class="place-actions" style="margin-top:6px;">
          ${flagButton(p)}
        </div>
      </div>`;
}

function toggleNearbyMode(){
  if(!state.nearbyMode && !state.userLocation){
    toast('Finding your location…');
    requestUserLocation(()=>{
      if(state.locationStatus === 'granted'){
        state.nearbyMode = true;
        toast('Showing places nearest to you first.');
      } else if(state.locationStatus === 'denied'){
        toast('Location permission denied — enable it in your browser settings to use this.');
      } else {
        toast('Location unavailable on this device.');
      }
      render();
    });
    return;
  }
  state.nearbyMode = !state.nearbyMode;
  render();
}

function onSearchInput(val){
  state.searchQuery = val;
  const clearWrap = document.getElementById('searchClearWrap');
  if(clearWrap){
    clearWrap.innerHTML = val ? `<button class="search-clear" onclick="onSearchInput('')">${icon('x', {size:11})}</button>` : '';
  }
  const body = document.getElementById('discoverBody');
  if(body){
    body.innerHTML = renderDiscoverBody();
  } else {
    render(); // fallback if the shell isn't present for some reason
  }
}

function renderSearchResults(query){
  const q = query.toLowerCase();
  const own = PLACES.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
  const external = EXTERNAL_RESULTS.filter(p =>
    (p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)) &&
    !PLACES.some(op => op.name.toLowerCase() === p.name.toLowerCase())
  );

  let html = '';

  if(own.length > 0){
    html += `<div class="section-eyebrow" style="margin-top:4px;">Already on biteScout</div>`;
    own.forEach(p=>{
      const saved = state.savedPlaces.includes(p.id);
      let distPill = '';
      if(state.userLocation){
        const d = distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng);
        distPill = `<span class="distance-pill">${formatDistance(d)}</span>`;
      }
      html += `
        <div class="place-card">
          <div class="place-top">
            <div>
              <span class="kind-pill ${p.kind}">${p.kind==='food'?'Food':'Place'}</span>${distPill}
              <div class="place-name">${p.name}</div>
              <div class="place-meta">${p.area} · ${p.cat}</div>
            </div>
            <div class="stars">${starRow(p.rating, {showEmpty:false})}</div>
          </div>
          <div class="place-actions">
            ${saved
              ? `<button class="btn btn-ghost">${icon('check',{size:13})} Saved</button>`
              : `<button class="btn btn-primary" onclick="toggleSave('${p.id}')">+ Save</button>`}
          </div>
          ${flagBadge(p)}
          <div class="place-actions" style="margin-top:6px;">
            ${flagButton(p)}
          </div>
        </div>`;
    });
  }

  if(external.length > 0){
    html += `<div class="section-eyebrow" style="margin-top:14px;">Found via Google Maps (simulated)</div>`;
    external.forEach(p=>{
      let distPill = '';
      if(state.userLocation){
        const d = distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng);
        distPill = `<span class="distance-pill">${formatDistance(d)}</span>`;
      }
      html += `
        <div class="place-card external">
          <div class="place-top">
            <div>
              <span class="kind-pill ${p.kind}">${p.kind==='food'?'Food':'Place'}</span> <span class="source-pill">via ${p.source}</span>${distPill}
              <div class="place-name">${p.icon} ${p.name}</div>
              <div class="place-meta">${p.area} · ${p.cat}</div>
            </div>
            <div class="stars">${starRow(p.rating, {showEmpty:false})}</div>
          </div>
          <p style="font-size:11.5px;color:#6B7280;margin:6px 0 10px;">Not yet on biteScout — went here and think it's worth logging?</p>
          <div class="place-actions">
            <button class="btn btn-primary" onclick="addExternalPlace('${p.ext_id}')">+ Add to biteScout</button>
          </div>
        </div>`;
    });
  }

  if(own.length===0 && external.length===0){
    html += `<div class="empty-note">No matches for "${query}" yet. Head to the Map tab to find and add real nearby places.</div>`;
  }

  return html;
}

function addExternalPlace(extId){
  const cap = isGuest() ? CAPS.guest.saves : Infinity;
  if(state.savedPlaces.length >= cap){ capToast('save'); return; }
  const ext = EXTERNAL_RESULTS.find(p=>p.ext_id===extId);
  if(!ext) return;
  const newId = 'user-added-' + ext.ext_id;
  if(!PLACES.some(p=>p.id===newId)){
    PLACES.push({
      id:newId, name:ext.name, area:ext.area, cat:ext.cat, kind:ext.kind,
      icon:ext.icon, rating:ext.rating, tags:['New on biteScout'], link:null,
      lat:ext.lat, lng:ext.lng
    });
  }
  state.savedPlaces.push(newId);
  state.searchQuery = '';
  toast(`${ext.name} added to biteScout and saved to your diary.`);
  setTab('diary');
}

function setDiscoverFilter(f){
  state.discoverFilter = f;
  render();
}

function flagBadge(p){
  const count = state.flagCounts[p.id] || 0;
  if(count === 0) return '';
  return `<div class="flag-badge">${icon('triangle-alert',{size:13})} ${count} report${count>1?'s':''} — being verified by the community</div>`;
}

function flagButton(p){
  const flagged = state.flaggedByMe.includes(p.id);
  if(flagged){
    return `<button class="btn btn-ghost flagged" onclick="flagPlace('${p.id}')">${icon('flag',{size:13})} Reported</button>`;
  }
  return `<button class="btn btn-ghost" onclick="flagPlace('${p.id}')">${icon('flag',{size:13})} Closed/Moved?</button>`;
}

function flagPlace(id){
  const flagged = state.flaggedByMe.includes(id);
  if(flagged){
    state.flaggedByMe = state.flaggedByMe.filter(x=>x!==id);
    state.flagCounts[id] = Math.max(0, (state.flagCounts[id]||0) - 1);
    toast('Report withdrawn.');
    if(fbUser){
      db.collection('flagCounts').doc(id).set({
        count: firebase.firestore.FieldValue.increment(-1)
      }, { merge: true }).catch(function(){});
    }
  } else {
    state.flaggedByMe.push(id);
    state.flagCounts[id] = (state.flagCounts[id]||0) + 1;
    toast('Thanks — flagged for the community to verify. This keeps biteScout accurate.');
    if(fbUser){
      db.collection('flagCounts').doc(id).set({
        count: firebase.firestore.FieldValue.increment(1)
      }, { merge: true }).catch(function(){});
    }
  }
  syncUserData();
  render();
}

function linkButton(p){
  if(p.link){
    return `<button class="link-btn" onclick="window.open('${p.link}','_blank')">Official site ${icon('external-link',{size:12})}</button>`;
  }
  return `<button class="link-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(p.name+' '+p.area)}','_blank')">Search ${icon('external-link',{size:12})}</button>`;
}

function toggleSave(id){
  const cap = isGuest() ? CAPS.guest.saves : Infinity;
  if(state.savedPlaces.includes(id)){
    state.savedPlaces = state.savedPlaces.filter(x=>x!==id);
  } else {
    if(state.savedPlaces.length >= cap){ capToast('save'); return; }
    state.savedPlaces.push(id);
  }
  syncUserData();
  render();
}

function capToast(kind){
  if(kind==='save') toast(`Guest limit reached (${CAPS.guest.saves} spots). Upgrade to save unlimited places.`);
  if(kind==='connect') toast(`Guest limit reached (${CAPS.guest.connections} connections). Upgrade to connect with more people.`);
  if(kind==='photo') toast(`Photo uploads are a User feature. Upgrade to add photos to your diary.`);
  if(kind==='avatar') toast(`Profile pictures are a User feature. Upgrade to personalize your avatar.`);
  if(kind==='comment') toast(`Guests can only reply within their ${CAPS.guest.connections} connections.`);
  if(kind==='customize') toast(`Design style & wallpaper are User-only. Upgrade to fully restyle your profile.`);
}

  const sortOptions = [
    {val:'recommended', label:'Recommended'},
    {val:3, label:'3★+'},
    {val:3.5, label:'3.5★+'},

  ];

  let html = `
    <div class="map-page">

        <span id="mapSearchClearWrap">${state.mapSearchQuery ? `<button class="search-clear" onclick="onMapSearchClear()">${icon('x', {size:11})}</button>` : ''}</span>

        <button data-filter="all" class="${state.mapFilter==='all'?'active':''}" onclick="setMapFilter('all')">All</button>

      <button class="locate-btn" onclick="onLocateMeClick()" title="Find my location">${icon('map-pin',{size:18})}</button>

      <div class="map-floating-bottom" id="mapLegend" style="${state.selectedMapPlaceId ? 'display:none;' : ''}">
        <span class="legend-dot" style="background:#FF8A00"></span>Food &nbsp;
        <span class="legend-dot" style="background:#0F6DBE"></span>Place &nbsp;·&nbsp; ${locNote}

function initMap(savedList){
  const container = document.getElementById('mapCanvas');
  if(!container || typeof maplibregl === 'undefined') return;

  // This app replaces the whole tab's HTML on every render(), which destroys the
  // old map container element. MapLibre uses WebGL though (unlike Leaflet's plain
  // Canvas/DOM), and browsers only allow a handful of live WebGL contexts per page —
  // so the previous instance must be explicitly disposed, or a long session could
  // eventually stop being able to create new ones.
  if(mapGL){
    mapGL.remove();
    mapGL = null;
  }

  // Determine center/zoom/bearing: preserve last view > user location > Melaka default
  const defaultCenter = [2.1896, 102.2501]; // Melaka town, where most seed places are
  let center = state.mapView ? state.mapView.center : (state.userLocation ? [state.userLocation.lat, state.userLocation.lng] : defaultCenter);
  let zoom = state.mapView ? state.mapView.zoom : (state.userLocation ? 14 : 12);
  let bearing = state.mapView ? (state.mapView.bearing || 0) : 0;

  mapGL = new maplibregl.Map({
    container: 'mapCanvas',
    style: 'https://tiles.openfreemap.org/styles/liberty', // full place/POI labels — Positron strips these, which is why only road names showed
    center: [center[1], center[0]], // MapLibre wants [lng, lat]
    zoom: zoom,
    bearing: bearing,
    pitch: 0,
    maxPitch: 0, // locked flat — no tilt gesture, so 3D building extrusions can never trigger
    attributionControl: false,
  });

  mapGL.addControl(new maplibregl.AttributionControl({ compact: true }));
  // Rotation is still native — two-finger twist on mobile, right-click-drag on desktop.
  // Tilt is disabled (maxPitch above), so the compass only ever resets bearing, not pitch.
  mapGL.addControl(new maplibregl.NavigationControl({ showCompass: true, visualizePitch: false }), 'bottom-left');

  mapGL.on('moveend', ()=>{
    const c = mapGL.getCenter();
    state.mapView = { center: [c.lat, c.lng], zoom: mapGL.getZoom(), bearing: mapGL.getBearing() };
    scheduleNearbyPOIRefresh();
  });

  mapGL.on('click', ()=> deselectMapPlace());

  mapGL.on('load', function(){
    // Liberty includes 3D building data (fill-extrusion layers) for when a map is
    // tilted. We keep the map locked flat (maxPitch above) and also hide these
    // layers outright here, so their geometry never renders or costs anything —
    // this keeps Liberty's full place/POI labels without the 3D performance hit.
    try{
      const styleLayers = mapGL.getStyle().layers || [];
      styleLayers.forEach(layer => {
        if(layer.type === 'fill-extrusion'){
          mapGL.setLayoutProperty(layer.id, 'visibility', 'none');
        }
      });
    }catch(e){ console.error('Could not hide 3D building layers', e); }

    if(state.userLocation){
      const el = document.createElement('div');
      el.style.cssText = 'width:16px;height:16px;border-radius:50%;background:#0F6DBE;border:3px solid #fff;box-shadow:0 0 0 2px rgba(15,109,190,0.35);';
      new maplibregl.Marker({ element: el })
        .setLngLat([state.userLocation.lng, state.userLocation.lat])
        .setPopup(new maplibregl.Popup({ offset: 12 }).setText('You are here'))
        .addTo(mapGL);
    }
    mapMarkers = [];
    renderMapMarkers(savedList);
    discoveredMarkers = [];
    renderDiscoveredMarkers();
    scheduleNearbyPOIRefresh();
  });
}

/* Adds/refreshes place pins on the already-existing map without recreating it —
   used both on first load and when the search box jumps/filters, so pan/zoom/
   rotation and the search input are never disturbed mid-typing. */
function renderMapMarkers(savedList){
  if(!mapGL) return;
  mapMarkers.forEach(m=> m.remove());
  mapMarkers = [];

  savedList.forEach(p=>{
    const color = p.kind==='food' ? '#FF8A00' : '#0F6DBE';
    const el = document.createElement('div');
    el.style.cssText = 'cursor:pointer;';
    el.innerHTML = mapPinSvg(color, 34);
    el.addEventListener('click', function(e){
      e.stopPropagation();
      selectMapPlace(p.id);
    });

    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' })
      .setLngLat([p.lng, p.lat])
      .addTo(mapGL);

    if(state.focusPlaceId === p.id){
      setTimeout(()=> selectMapPlace(p.id), 300);
    }

    mapMarkers.push(marker);
  });

  state.focusPlaceId = null; // consume it so it doesn't reopen on later re-renders
}

/* Compact preview card shown at the bottom of the map when a pin is tapped —
   tap the card itself to open the full-screen detail view. */
function mapBottomSheetHtml(p){

  let distText = '';

  if(p.discovered){
    const tint = p.group === 'utility' ? '#FBE9E5' : '#E5E7EB';
    return `
      <div class="map-sheet-card" onclick="openMapPlaceDetail('${p.id}')">
        <div class="map-sheet-photo" style="background:${tint};">${p.icon}</div>
        <div class="map-sheet-info">
          <div class="map-sheet-name">${p.name}</div>
          <div class="map-sheet-meta">${p.cat} · Not yet on biteScout${distText}</div>
        </div>
        <button class="map-sheet-save" onclick="event.stopPropagation(); addDiscoveredPlace('${p.id}');" title="Add to biteScout">
          ${icon('plus',{size:16})}
        </button>
      </div>`;
  }
  const tint = p.kind==='food' ? '#FFE1C2' : '#D7EDF8';
  const saved = state.savedPlaces.includes(p.id);
  return `
    <div class="map-sheet-card" onclick="openMapPlaceDetail('${p.id}')">
      <div class="map-sheet-photo" style="background:${tint};">${p.icon}</div>
      <div class="map-sheet-info">
        <div class="map-sheet-name">${p.name}</div>
        <div class="map-sheet-meta">${icon('star',{size:12,filled:true,color:'#FFC145'})} ${p.rating} · ${p.cat}${distText}</div>
      </div>
      <button class="map-sheet-save ${saved?'saved':''}" onclick="event.stopPropagation(); toggleSave('${p.id}');" title="${saved?'Saved':'Save'}">
        ${icon(saved?'check':'plus',{size:16})}
      </button>
    </div>`;
}

/* Selecting a pin only updates the bottom sheet directly (never calls the full
   render()), so the map's pan/zoom/rotation is never disturbed by browsing pins. */
function selectMapPlace(id){
  state.selectedMapPlaceId = id;

  if(sheet && p){
    sheet.innerHTML = mapBottomSheetHtml(p);
    sheet.classList.add('show');

}

function deselectMapPlace(){
  state.selectedMapPlaceId = null;
  const sheet = document.getElementById('mapBottomSheet');
  const legend = document.getElementById('mapLegend');
  if(sheet){ sheet.classList.remove('show'); sheet.innerHTML = ''; }
  if(legend) legend.style.display = '';

function openMapPlaceDetail(id){

  document.getElementById('mapDetailScreen').classList.remove('hide');

function discoveredPlaceDetailHtml(p){

function currentMapPlaceList(){

    .filter(p=> state.mapSort==='recommended' || p.rating >= state.mapSort);
}

/* Mobile virtual keyboards are inconsistent about firing a clean 'Enter'
   keydown — some only reflect it on keyup, some report keyCode 13 without a
   proper event.key. Checking multiple signals on both events (with a guard so
   a single press doesn't double-fire across keydown+keyup) covers this. */
let _mapSearchKeyHandled = false;
function onMapSearchKey(e){
  const isEnter = e.key === 'Enter' || e.keyCode === 13 || e.which === 13;
  if(!isEnter) return;
  e.preventDefault();
  if(e.type === 'keydown'){
    _mapSearchKeyHandled = true;
    onMapSearchSubmit();
  } else if(e.type === 'keyup' && !_mapSearchKeyHandled){
    onMapSearchSubmit();
  }
  if(e.type === 'keyup') _mapSearchKeyHandled = false;
}

function onMapSearchTyping(val){
  state.mapSearchQuery = val;
  const clearWrap = document.getElementById('mapSearchClearWrap');
  if(clearWrap){
    clearWrap.innerHTML = val ? `<button class="search-clear" onclick="onMapSearchClear()">${icon('x', {size:11})}</button>` : '';
  }
}

function onMapSearchClear(){
  state.mapSearchQuery = '';
  const input = document.getElementById('mapSearchInput');
  if(input) input.value = '';
  const clearWrap = document.getElementById('mapSearchClearWrap');
  if(clearWrap) clearWrap.innerHTML = '';
  renderMapMarkers(currentMapPlaceList());
}

/* Runs on Enter (or tapping the search icon). First checks if the query matches one
   of your own saved places — if so, jumps straight to that pin. Otherwise treats
   it as a place name (e.g. "Penang") and geocodes it via Nominatim, OpenStreetMap's
   own free geocoding API — no API key or billing needed, unlike Google Places. */
function onMapSearchSubmit(){
  const q = state.mapSearchQuery.trim();
  if(!q) return;

  const savedMatch = PLACES.find(p=> state.savedPlaces.includes(p.id) && p.name.toLowerCase().includes(q.toLowerCase()));
  if(savedMatch){
    focusPlaceOnMap(savedMatch.id);
    return;
  }

  toast(`Searching for "${q}"…`);
  const controller = new AbortController();
  const timeout = setTimeout(()=> controller.abort(), 8000);
  fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`, {
    headers: { 'Accept-Language': 'en' },
    signal: controller.signal,
  })
    .then(res => {
      clearTimeout(timeout);
      if(!res.ok) throw new Error('bad status ' + res.status);
      return res.json();
    })
    .then(results => {
      if(results && results.length > 0){
        const r = results[0];
        const lat = parseFloat(r.lat), lon = parseFloat(r.lon);
        state.mapView = { center: [lat, lon], zoom: 14, bearing: 0 };
        toast('Showing ' + r.display_name.split(',')[0]);
        if(mapGL){
          // Map is already live — just move the camera, don't tear down and rebuild
          // the whole map (that re-fetches the style/tiles and re-inits WebGL, which
          // is what was causing the lag). The camera move's moveend event will
          // automatically refresh the nearby-POI layer for the new area.
          mapGL.flyTo({ center: [lon, lat], zoom: 14, essential: true });
        } else {
          render();
        }
      } else {
        toast(`No location found for "${q}".`);
      }
    })
    .catch((err)=>{
      clearTimeout(timeout);
      console.error('Map search failed:', err);
      toast('Search failed — check your connection.');
    });
}

/* Queries Overpass for named malls, supermarkets, convenience stores, gas
   stations, restaurants and cafes near a searched point. Best-effort: if it
   fails or times out, the geocoded location search above still already
   worked, so this failing silently-ish is acceptable — it's a bonus layer. */
/* Debounced so panning/zooming doesn't hammer Overpass's free public server
   with a request on every tiny movement — only fires ~900ms after the map
   settles. */
let poiRefreshTimer = null;
function scheduleNearbyPOIRefresh(){
  clearTimeout(poiRefreshTimer);
  poiRefreshTimer = setTimeout(fetchNearbyPOIs, 500);
}

/* Always-on background layer of well-known nearby points of interest — shows
   automatically for whatever's currently in view (like Google/Apple Maps),
   not just after an explicit search. Uses Overpass API against the map's
   actual visible bounds. Un-adopted places never persist here permanently —
   this simply reflects "what's around right now"; only tapping "Add to
   biteScout" turns one into a real, permanent cobalt/orange biteScout place. */
let poiFetchController = null;
function fetchNearbyPOIs(){
  if(!mapGL) return;

  // Don't bother at very wide zoom levels — city/country view would return
  // thousands of results and just clutter the map (same convention real map
  // apps use: POI icons only appear once you're zoomed in reasonably close).
  // Zoomed in further than before too — a smaller area means a smaller,
  // faster-to-process query for Overpass's shared free server.
  if(mapGL.getZoom() < 13){
    DISCOVERED_PLACES = [];
    renderDiscoveredMarkers();
    return;
  }

  // Cancel any still-in-flight previous request — otherwise a slow older
  // response could land after a newer one and show stale pins for the
  // wrong area.
  if(poiFetchController) poiFetchController.abort();
  poiFetchController = new AbortController();
  const timeout = setTimeout(()=> poiFetchController.abort(), 10000);

  const b = mapGL.getBounds();
  const bbox = `${b.getSouth()},${b.getWest()},${b.getNorth()},${b.getEast()}`;

  // nwr (node/way/relation) instead of just node — parks, hospitals, and museums
  // are frequently mapped as areas in OSM, not single points, so node-only
  // queries were missing most of them.
  const query = `[out:json][timeout:10];(
    nwr["shop"="mall"](${bbox});
    nwr["shop"="supermarket"](${bbox});
    nwr["shop"="convenience"](${bbox});
    nwr["amenity"="restaurant"](${bbox});
    nwr["amenity"="cafe"](${bbox});
    nwr["amenity"="fast_food"](${bbox});
    nwr["tourism"="zoo"](${bbox});
    nwr["tourism"="museum"](${bbox});
    nwr["leisure"="park"](${bbox});
    nwr["leisure"="garden"](${bbox});
    nwr["amenity"="fuel"](${bbox});
    nwr["amenity"="police"](${bbox});
    nwr["amenity"="hospital"](${bbox});
    nwr["amenity"="clinic"](${bbox});
  );out center 50;`;

  fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query),
    signal: poiFetchController.signal,
  })
    .then(res => { clearTimeout(timeout); if(!res.ok) throw new Error('bad status ' + res.status); return res.json(); })
    .then(data => {
      const named = (data.elements || []).filter(e => e.tags && e.tags.name);
      DISCOVERED_PLACES = named.slice(0, 50).map(e => {
        const id = 'poi-' + e.id;
        if(PLACES.find(p=>p.id===id)) return null; // already adopted as a real biteScout place — skip, it renders as a saved pin instead
        const catKey = e.tags.shop || e.tags.amenity || e.tags.tourism || e.tags.leisure;
        const meta = POI_CATEGORY_MAP[catKey] || { label: catKey || 'Place', icon: '📍', kind: 'place', group: 'interest' };
        // Nodes give lat/lon directly; ways/relations give a center object instead.
        const lat2 = e.lat !== undefined ? e.lat : (e.center ? e.center.lat : null);
        const lon2 = e.lon !== undefined ? e.lon : (e.center ? e.center.lon : null);
        if(lat2 == null || lon2 == null) return null;
        return {
          id: id,
          name: e.tags.name,
          area: '',
          cat: meta.label,
          kind: meta.kind,
          icon: meta.icon,
          group: meta.group,
          rating: 0,
          tags: [],
          link: null,
          lat: lat2,
          lng: lon2,
          discovered: true,
        };
      }).filter(Boolean);
      renderDiscoveredMarkers();
    })
    .catch(err => {
      clearTimeout(timeout);
      if(err.name !== 'AbortError'){
        console.error('Nearby POI search failed:', err);
      }
    });
}

/* Discovered POIs are color-coded by group: light grey for general points of
   interest (malls, museums, zoos, restaurants...), red for utility/emergency
   services (gas stations, police, hospital, clinic) — distinct from the
   cobalt/orange used for the user's own saved biteScout places. */
function renderDiscoveredMarkers(){
  if(!mapGL) return;
  discoveredMarkers.forEach(m=> m.remove());
  discoveredMarkers = [];
  DISCOVERED_PLACES.forEach(p=>{
    const color = p.group === 'utility' ? '#BE4B33' : '#9CA3AF';
    const el = document.createElement('div');
    el.style.cssText = 'cursor:pointer;';
    el.innerHTML = mapPinSvg(color, 28);
    el.addEventListener('click', function(e){
      e.stopPropagation();
      selectMapPlace(p.id);
    });
    const marker = new maplibregl.Marker({ element: el, anchor: 'bottom' }).setLngLat([p.lng, p.lat]).addTo(mapGL);
    discoveredMarkers.push(marker);
  });
}

/* A selected map pin can be either a real, saved biteScout place or a
   temporary discovered POI — this looks in both places. */
function findAnyPlace(id){
  return PLACES.find(p=>p.id===id) || DISCOVERED_PLACES.find(p=>p.id===id);
}

/* Promotes a discovered POI into a real biteScout place — no rating is
   fabricated (stays 0/unrated) since biteScout's whole premise is trust from
   real visits, not assumed defaults. */
function addDiscoveredPlace(id){
  const p = DISCOVERED_PLACES.find(x=>x.id===id);
  if(!p) return;
  const newPlace = { id:p.id, name:p.name, area:p.area, cat:p.cat, kind:p.kind, icon:p.icon, rating:0, tags:[], link:null, lat:p.lat, lng:p.lng };
  PLACES.push(newPlace);
  DISCOVERED_PLACES = DISCOVERED_PLACES.filter(x=>x.id!==id);
  if(!state.savedPlaces.includes(newPlace.id)) state.savedPlaces.push(newPlace.id);
  syncUserData();
  toast(newPlace.name + ' added to biteScout!');
  renderMapMarkers(currentMapPlaceList());
  renderDiscoveredMarkers();
  selectMapPlace(newPlace.id);
  const detailScreen = document.getElementById('mapDetailScreen');
  if(detailScreen && !detailScreen.classList.contains('hide')){
    document.getElementById('mapDetailBody').innerHTML = placeCardHtml(newPlace);
  }
}

  if(state.tab === 'map' && mapGL){

function renderPeopleBody(){
  const cap = isGuest() ? CAPS.guest.connections : Infinity;
  const used = state.connections.length;
  let html = '';

  if(state.peopleSearchOpen){
    const q = state.peopleSearchQuery.trim().toLowerCase();
    if(q.length > 0){
      const matches = REAL_PEOPLE.filter(p=>p.name.toLowerCase().includes(q));
      html += `<div class="section-eyebrow" style="margin-top:14px;">Search results</div>`;
      if(matches.length===0){
        html += `<div class="empty-note">No one found matching "${state.peopleSearchQuery}".</div>`;
      } else {
        matches.forEach(p=> html += personRowHtml(p, cap, used));
      }
      return html;
    }
  }

  // Real signed-up biteScout members — loaded from Firestore (loadRealPeople()).
  // No mock people anymore: an empty list here just means no one else has joined yet.
  const withDist = state.userLocation
    ? REAL_PEOPLE.map(p=>({ ...p, dist: distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng) })).sort((a,b)=>a.dist-b.dist)
    : REAL_PEOPLE;

  html += `<div class="section-eyebrow" style="margin-top:6px;">${icon('map-pin',{size:11})} biteScout members</div>`;
  if(withDist.length===0){
    html += `<div class="empty-note">No one else has joined biteScout yet — invite a friend to test it with you!</div>`;
  }
  withDist.forEach(p=> html += personRowHtml(p, cap, used, (state.userLocation && p.dist!=null) ? formatDistance(p.dist) : null));
  return html;
}

function personRowHtml(p, cap, used, distLabel){
  const connected = state.connections.includes(p.id);
  const blocked = state.blocked.includes(p.id);
  let actionBtn;
  if(blocked){
    actionBtn = `<button class="icon-btn" onclick="toggleBlock('${p.id}')" title="Unblock">${icon('ban',{size:14})}</button>`;
  } else if(connected){
    actionBtn = `<button class="icon-btn" onclick="toggleConnect('${p.id}')" title="Remove">${icon('check',{size:14})}</button>`;
  } else if(isGuest() && used>=cap){
    actionBtn = `<button class="icon-btn" onclick="capToast('connect')" title="Locked">${icon('lock',{size:14})}</button>`;
  } else {
    actionBtn = `<button class="icon-btn" onclick="toggleConnect('${p.id}')" title="Add">${icon('plus',{size:14})}</button>`;
  }
  return `
    <div class="person-row">
      <div class="person-avatar" style="background:${p.color}">${p.name[0]}</div>
      <div class="person-info">
        <div class="person-name">${p.name}</div>
        <div class="person-badge">${p.badge} · ${p.visits} visits${distLabel ? ' · '+distLabel : ''}</div>
      </div>
      <div class="person-actions">
        ${actionBtn}
        ${!blocked ? `<button class="icon-btn" onclick="toggleBlock('${p.id}')" title="Block">${icon('ban',{size:14})}</button>` : ''}
      </div>
    </div>`;
}

function toggleConnect(id){
  const cap = isGuest() ? CAPS.guest.connections : Infinity;
  if(state.connections.includes(id)){
    state.connections = state.connections.filter(x=>x!==id);
  } else {
    if(state.connections.length >= cap){ capToast('connect'); return; }
    state.connections.push(id);
  }
  syncUserData();
  render();
}

function toggleBlock(id){
  if(state.blocked.includes(id)){
    state.blocked = state.blocked.filter(x=>x!==id);
    toast('Unblocked.');
  } else {
    state.blocked.push(id);
    state.connections = state.connections.filter(x=>x!==id);
    toast('Blocked. They will no longer appear in your circle.');
  }
  syncUserData();
  render();
}

    html += `<p class="settings-row-note">Create a real account from the welcome screen to set a name and save your data.</p>`;
  } else {
    html += `
      <input id="settingsNameInput" value="${state.profileName}" placeholder="Your name" maxlength="24" style="width:100%;padding:10px 12px;border-radius:var(--r-sm);border:1px solid #D8D8D8;font-family:inherit;font-size:13px;margin-bottom:8px;">
      <div class="welcome-auth-error" id="settingsNameError"></div>
      <button class="btn btn-primary" style="width:100%;justify-content:center;" onclick="handleSaveSettingsName()">Save name</button>`;
  }
  html += `</div>`;

  html += `<div class="settings-section">
    <div class="settings-section-title">Appearance</div>
    <p class="settings-row-note">${icon('palette',{size:13})} Theme customization is being reworked — coming back soon with a fresh look.</p>
  </div>`;

  html += `<div class="settings-section">
    <div class="settings-section-title">Account</div>`;
  if(fbUser){
    html += `
      <p class="settings-row-note" style="margin-bottom:10px;">Signed in as <strong style="color:var(--coffee);">${fbUser.email}</strong></p>
      <button class="btn btn-ghost" style="width:100%;justify-content:center;" onclick="handleSignOut()">Log out</button>`;
  } else {
    html += `<p class="settings-row-note">You're browsing as a Guest — nothing is saved. Create a real account from the welcome screen to unlock full features.</p>`;
  }
  html += `</div>`;

  html += `<div class="settings-section">
    <div class="settings-section-title">About</div>
    <p class="settings-row-note">biteScout — ${APP_VERSION}<br>Discover. Taste. Explore.</p>
  </div>`;

  return html;
}

function handleSaveSettingsName(){
  const input = document.getElementById('settingsNameInput');
  const errEl = document.getElementById('settingsNameError');
  const raw = input.value.trim();
  errEl.textContent = '';
  if(!fbUser) return;
  if(raw.length < 2 || raw.length > 24){ errEl.textContent = 'Name should be 2–24 characters.'; return; }
  const lower = raw.toLowerCase();
  if(lower === (state.profileName||'').trim().toLowerCase()){ toast('Name unchanged.'); return; }

  db.collection('publicUsers').where('displayNameLower','==',lower).get().then(function(snap){
    const takenByOther = snap.docs.some(d=> d.id !== fbUser.uid);
    if(takenByOther){
      errEl.textContent = 'That name is taken — please choose another.';
      return;
    }
    state.profileName = raw;
    db.collection('publicUsers').doc(fbUser.uid).set({
      displayName: raw,
      displayNameLower: lower,
    }, { merge: true }).then(function(){
      syncUserData();
      toast('Name saved.');
      renderBrandArea();
      loadRealPeople();
    }).catch(function(){
      errEl.textContent = 'Could not save — check your connection.';
    });
  }).catch(function(){
    errEl.textContent = 'Could not check name availability — check your connection.';
  });
}

function handleWallpaperUpload(event){
  if(isGuest()){ capToast('customize'); return; }
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const targetW = 600, targetH = 220;
      canvas.width = targetW; canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(targetW/img.width, targetH/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (targetW-w)/2, (targetH-h)/2, w, h);
      state.customWallpaperUrl = canvas.toDataURL('image/jpeg', 0.85);
      state.wallpaper = 'custom';
      render();
      toast('Wallpaper photo uploaded and applied.');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// DUMMY placeholder content — final copy to be written together (see chat).
// Each slide: icon (line-icon name), headline, body.
const ONBOARDING_SLIDES = [
  { icon:'circle-help', headline:"Reviews You Can't Trust?", body:"Fake reviews. Paid placements. Listings that haven't been updated in years. Sound familiar?" },
  { icon:'compass', headline:'Real Visits. Real Trust.', body:'biteScout only shows places real people have actually been to — not anonymous stars, not sponsored spots.' },
  { icon:'utensils', headline:'Discover Food & Places', body:'From hidden kopitiams to must-see spots — every listing exists because someone genuinely went and vouched for it.' },
  { icon:'flag', headline:'Powered by Real Explorers', body:'Follow friends and trusted local scouts. Help keep the map accurate by flagging places that have closed or moved.' },
  { icon:'book-open', headline:'Start Your Own Food Diary', body:"Save your favourites, log your visits, and build a trail that's genuinely yours." },
];

function renderOnboardingSlide(){
  const area = document.getElementById('onboardingSlideArea');
  const dotsEl = document.getElementById('onboardingDots');
  const nextBtn = document.getElementById('onboardingNextBtn');
  if(!area) return;

  const i = state.onboardingIndex;
  const slide = ONBOARDING_SLIDES[i];

  area.innerHTML = `
    <div class="onboarding-icon">${icon(slide.icon, {size:56, strokeWidth:1.5})}</div>
    <div class="onboarding-headline">${slide.headline}</div>
    <div class="onboarding-body">${slide.body}</div>`;

  dotsEl.innerHTML = ONBOARDING_SLIDES.map((_, idx)=>
    `<div class="onboarding-dot ${idx===i?'active':''}" onclick="goToOnboardingSlide(${idx})"></div>`
  ).join('');

  nextBtn.textContent = (i === ONBOARDING_SLIDES.length - 1) ? 'Get Started' : 'Next';
}

function onboardingNext(){
  if(state.onboardingIndex < ONBOARDING_SLIDES.length - 1){
    state.onboardingIndex++;
    renderOnboardingSlide();
  } else {
    finishOnboarding();
  }
}

function goToOnboardingSlide(idx){
  state.onboardingIndex = idx;
  renderOnboardingSlide();
}

function finishOnboarding(){
  const onboarding = document.getElementById('onboardingScreen');
  if(onboarding){
    onboarding.classList.add('hide');
    // Kept in the DOM (not removed) so "Replay intro" in the Me tab can bring it back later.
  }
  try{ localStorage.setItem('bitescout_onboarding_seen', '1'); } catch(e){ /* private browsing etc — fine, just won't remember */ }
}

function replayOnboarding(){
  state.onboardingIndex = 0;
  renderOnboardingSlide();
  const onboarding = document.getElementById('onboardingScreen');
  if(onboarding) onboarding.classList.remove('hide');
}

function setupOnboardingSwipe(){
  const el = document.getElementById('onboardingScreen');
  if(!el) return;
  let startX = null;
  el.addEventListener('touchstart', (e)=>{ startX = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', (e)=>{
    if(startX === null) return;
    const deltaX = e.changedTouches[0].clientX - startX;
    if(Math.abs(deltaX) > 50){
      if(deltaX < 0 && state.onboardingIndex < ONBOARDING_SLIDES.length - 1){
        state.onboardingIndex++; renderOnboardingSlide();
      } else if(deltaX > 0 && state.onboardingIndex > 0){
        state.onboardingIndex--; renderOnboardingSlide();
      }
    }
    startX = null;
  }, {passive:true});
}

function dismissWelcomeScreen(){
  const welcome = document.getElementById('welcomeScreen');
  if(welcome){
    welcome.classList.add('hide');
    setTimeout(()=> welcome.remove(), 450);
  }
}

function chooseWelcomeAction(tier){
  // Guest path only — no account, nothing persisted, exactly as before.
  // Real accounts go through handleCreateAccount()/handleSignIn() below.
  setTier(tier);
  dismissWelcomeScreen();
}

function setWelcomeAuthError(msg){
  const el = document.getElementById('welcomeAuthError');
  if(el) el.textContent = msg || '';
}

function setWelcomeButtonsLoading(loading){
  const a = document.getElementById('btnCreateAccount');
  const b = document.getElementById('btnSignIn');
  if(a){ a.disabled = loading; a.textContent = loading ? 'Please wait…' : 'Create Account'; }
  if(b){ b.disabled = loading; b.textContent = loading ? 'Please wait…' : 'Sign In'; }
}

function friendlyAuthError(err){
  const code = (err && err.code) || '';
  if(code.includes('email-already-in-use')) return 'That email already has an account — try Sign In instead.';
  if(code.includes('invalid-email')) return 'That email address looks invalid.';
  if(code.includes('user-not-found') || code.includes('wrong-password') || code.includes('invalid-credential')) return 'Incorrect email or password.';
  if(code.includes('weak-password')) return 'Password must be at least 6 characters.';
  if(code.includes('network-request-failed')) return 'No connection — check your internet and try again.';
  return 'Something went wrong. Please try again.';
}

function handleCreateAccount(){
  const email = document.getElementById('welcomeEmail').value.trim();
  const password = document.getElementById('welcomePassword').value;
  setWelcomeAuthError('');
  if(!email || !password){ setWelcomeAuthError('Enter an email and password.'); return; }
  if(password.length < 6){ setWelcomeAuthError('Password must be at least 6 characters.'); return; }
  setWelcomeButtonsLoading(true);
  auth.createUserWithEmailAndPassword(email, password)
    .then(function(cred){
      // Fresh real account starts from a clean slate — not the Guest demo seed data.
      // Note: publicUsers doc is created once a unique name is chosen, in handleNicknameSubmit().
      return db.collection('users').doc(cred.user.uid).set({
        profileName: '',
        savedPlaces: [],
        connections: [],
        blocked: [],
        flaggedByMe: [],
        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
      });
    })
    .then(function(){ showNicknameStep(); })
    .catch(function(err){
      setWelcomeButtonsLoading(false);
      setWelcomeAuthError(friendlyAuthError(err));
    });
}

function showNicknameStep(){
  dismissWelcomeScreen();
  setWelcomeButtonsLoading(false);
  const el = document.getElementById('nicknameScreen');
  if(el) el.classList.remove('hide');
}

function handleNicknameSubmit(){
  const input = document.getElementById('nicknameInput');
  const errEl = document.getElementById('nicknameError');
  const btn = document.getElementById('btnNicknameSubmit');
  const raw = input.value.trim();
  errEl.textContent = '';
  if(raw.length < 2 || raw.length > 24){ errEl.textContent = 'Name should be 2–24 characters.'; return; }
  if(!fbUser) return; // shouldn't happen — this screen only shows right after sign-up
  const lower = raw.toLowerCase();
  btn.disabled = true;
  btn.textContent = 'Please wait…';

  db.collection('publicUsers').where('displayNameLower','==',lower).get().then(function(snap){
    if(!snap.empty){
      btn.disabled = false;
      btn.textContent = 'Continue';
      errEl.textContent = 'That name is taken — please choose another.';
      return;
    }
    state.profileName = raw;
    return db.collection('publicUsers').doc(fbUser.uid).set({
      displayName: raw,
      displayNameLower: lower,
      savedCount: 0,
      createdAt: firebase.firestore.FieldValue.serverTimestamp(),
    }).then(function(){
      syncUserData();
      const el = document.getElementById('nicknameScreen');
      if(el) el.classList.add('hide');
      setTier('user');
      loadRealPeople();
    });
  }).catch(function(){
    btn.disabled = false;
    btn.textContent = 'Continue';
    errEl.textContent = 'Could not check name availability — check your connection.';
  });
}

function handleSignIn(){
  const email = document.getElementById('welcomeEmail').value.trim();
  const password = document.getElementById('welcomePassword').value;
  setWelcomeAuthError('');
  if(!email || !password){ setWelcomeAuthError('Enter an email and password.'); return; }
  setWelcomeButtonsLoading(true);
  auth.signInWithEmailAndPassword(email, password)
    .then(function(){ dismissWelcomeScreen(); })
    .catch(function(err){
      setWelcomeButtonsLoading(false);
      setWelcomeAuthError(friendlyAuthError(err));
    });
}

function handleSignOut(){
  auth.signOut().then(function(){
    fbUser = null;
    state.profileName = '';
    state.savedPlaces = [];
    state.connections = [];
    state.blocked = [];
    state.flaggedByMe = [];
    setTier('guest');
    toast('Logged out.');
  });
}

/* Loads the signed-in user's real data from Firestore into local state, then renders. */
auth.onAuthStateChanged(function(user){
  fbUser = user;
  if(user){
    db.collection('users').doc(user.uid).get().then(function(doc){
      if(doc.exists){
        const d = doc.data();
        state.profileName = d.profileName || '';
        state.savedPlaces = d.savedPlaces || [];
        state.connections = d.connections || [];
        state.blocked = d.blocked || [];
        state.flaggedByMe = d.flaggedByMe || [];
      }
      setTier('user');
      dismissWelcomeScreen(); // returning signed-in session — skip straight past Welcome
      loadRealPeople(); // refresh now that we know who to exclude from the list
    }).catch(function(err){
      console.error('Failed to load profile', err);
      toast('Could not load your saved data — check your connection.');
    });
  }
});

/* Debounced write-through to Firestore. No-op for Guest/demo-User (no fbUser) —
   the manual top-bar tier toggle stays purely local, exactly as designed. */
let syncTimer = null;
function syncUserData(){
  if(!fbUser) return;
  clearTimeout(syncTimer);
  syncTimer = setTimeout(function(){
    db.collection('users').doc(fbUser.uid).set({
      profileName: state.profileName,
      savedPlaces: state.savedPlaces,
      connections: state.connections,
      blocked: state.blocked,
      flaggedByMe: state.flaggedByMe,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
    }, { merge: true }).catch(function(err){
      console.error('Sync failed', err);
      toast('Could not save — check your connection.');
    });

    // Mirror the public-safe subset (name, saved count, rough location) so
    // this person shows up correctly for others in the People tab.
    const publicUpdate = {
      displayName: state.profileName || '',
      savedCount: state.savedPlaces.length,
    };
    if(state.userLocation){
      publicUpdate.lat = state.userLocation.lat;
      publicUpdate.lng = state.userLocation.lng;
    }
    db.collection('publicUsers').doc(fbUser.uid).set(publicUpdate, { merge: true }).catch(function(){});
  }, 500);
}

/* Real, shared community flag counts — every visitor (Guest or User) reads the
   same live numbers, matching biteScout's "trust from real community activity" philosophy. */
function loadFlagCounts(){
  PLACES.forEach(function(p){
    db.collection('flagCounts').doc(p.id).get().then(function(doc){
      state.flagCounts[p.id] = doc.exists ? (doc.data().count || 0) : 0;
      render();
    }).catch(function(){ /* fall back to local count silently if offline */ });
  });
}
