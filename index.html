<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>biteScout</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#FFFFFF">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<style>
  :root{
    --ink:#0D4D4D;
    --ink-soft:#0C4848;
    --chrome:#FFFFFF;
    --gold:#FFA726;
    --chili:#BE4B33;
    --leaf:#F0A824;
    --paper:#F5F7F7;
    --paper-dim:#F0F0F0;
    --coffee:#1A1A1A;
    --accent:#FFA726;
    --accent-dim:#FFA72633;
    --card-bg:#ffffff;
    --radius:18px;
    --r-lg:18px;
    --r-md:20px;
    --r-sm:10px;
    --shadow:0 8px 24px rgba(27,20,10,0.18);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background: #16211c;
    min-height:100vh;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:28px 12px;
    font-family:'Plus Jakarta Sans', sans-serif;
  }
  .display{font-family:'Plus Jakarta Sans', sans-serif;}

  /* ===== Splash screen ===== */
  .splash-screen{
    position:fixed;
    inset:0;
    background:#ffffff;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    transition:opacity 0.45s ease;
  }
  .splash-screen img{
    width:62%;
    max-width:300px;
  }
  .splash-screen.hide{
    opacity:0;
    pointer-events:none;
  }

  /* ===== Welcome screen ===== */
  .welcome-screen{
    position:fixed;
    inset:0;
    background:#ffffff;
    z-index:9000;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:48px 28px calc(36px + env(safe-area-inset-bottom));
    transition:opacity 0.4s ease;
  }
  .welcome-screen.hide{
    opacity:0;
    pointer-events:none;
  }
  .welcome-logo-wrap{
    margin-top:24px;
    width:100%;
    display:flex;
    justify-content:center;
  }
  .welcome-logo-wrap img{
    width:68%;
    max-width:280px;
  }
  .welcome-spacer{
    flex:1;
  }
  .welcome-actions{
    width:100%;
    max-width:340px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .welcome-btn-primary{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:30px;
    padding:15px;
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
  }
  .welcome-btn-outline{
    background:transparent;
    color:var(--accent);
    border:2px solid var(--accent);
    border-radius:30px;
    padding:13px;
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
  }
  .welcome-link{
    background:none;
    border:none;
    color:var(--ink);
    font-family:inherit;
    font-weight:600;
    font-size:14px;
    padding:10px;
    cursor:pointer;
    width:100%;
    text-align:center;
    opacity:0.75;
  }

  /* ===== Onboarding carousel ===== */
  .onboarding-screen{
    position:fixed;
    inset:0;
    background:#ffffff;
    z-index:9500;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:56px 28px calc(28px + env(safe-area-inset-bottom));
    transition:opacity 0.35s ease;
  }
  .onboarding-screen.hide{
    opacity:0;
    pointer-events:none;
  }
  .onboarding-skip{
    position:absolute;
    top:calc(20px + env(safe-area-inset-top));
    right:20px;
    background:none;
    border:none;
    color:#9CA3AF;
    font-family:inherit;
    font-weight:700;
    font-size:13px;
    cursor:pointer;
    z-index:1;
  }
  .onboarding-slide-area{
    flex:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    text-align:center;
    max-width:340px;
  }
  .onboarding-icon{
    font-size:72px;
    margin-bottom:28px;
  }
  .onboarding-headline{
    font-weight:800;
    font-size:20px;
    color:var(--coffee);
    margin-bottom:12px;
  }
  .onboarding-body{
    font-size:14px;
    color:#6B7280;
    line-height:1.6;
  }
  .onboarding-dots{
    display:flex;
    gap:7px;
    margin-bottom:22px;
  }
  .onboarding-dot{
    width:8px;height:8px;
    border-radius:50%;
    background:#E0E0E0;
    transition:all .2s ease;
  }
  .onboarding-dot.active{
    background:var(--accent);
    width:22px;
    border-radius:5px;
  }
  .onboarding-next{
    background:var(--accent);
    color:#fff;
    border:none;
    border-radius:30px;
    padding:15px;
    font-family:inherit;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    width:100%;
    max-width:340px;
  }

  /* ===== Edge style presets (shape) ===== */
  .phone[data-edge="sharp"]{
    --r-lg:2px;
    --r-md:4px;
    --r-sm:2px;
  }
  .phone[data-edge="half"]{
    --r-lg:9px;
    --r-md:10px;
    --r-sm:6px;
  }
  .phone[data-edge="curved"]{
    --r-lg:18px;
    --r-md:20px;
    --r-sm:10px;
  }

  /* ===== Design style presets (color) ===== */

  /* ===== Phone shell ===== */
  /* Desktop/preview: decorative mockup frame, floating and rounded */
  .phone{
    width:400px;
    max-width:100%;
    background:var(--paper);
    border-radius:38px;
    border:8px solid #1A1A1A;
    box-shadow:var(--shadow), 0 0 0 1px rgba(0,0,0,0.2);
    overflow:hidden;
    position:relative;
    display:flex;
    flex-direction:column;
    height:820px;
  }

  /* Real mobile device: fill the entire viewport, no mockup chrome */
  @media (max-width: 600px){
    body{
      padding:0;
      align-items:stretch;
      background:var(--chrome);
    }
    .phone{
      width:100vw;
      max-width:100vw;
      height:100dvh;
      max-height:100dvh;
      border:none;
      border-radius:0;
      box-shadow:none;
    }
    .topbar{
      padding-top:calc(16px + env(safe-area-inset-top));
    }
    .bottomnav{
      padding-bottom:calc(14px + env(safe-area-inset-bottom));
    }
  }

  /* ===== Top bar ===== */
  .topbar{
    background:var(--chrome);
    color:var(--coffee);
    padding:16px 18px 14px;
    position:relative;
    border-bottom:1px solid #EEEEEE;
    transition:padding .2s ease;
  }
  .topbar.topbar-compact{
    padding:10px 18px 8px;
  }
  .topbar.topbar-compact .demo-label{
    display:none;
  }
  .brand-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .brand-mark{
    width:32px;height:32px;
    border-radius:50%;
    background:#fff;
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
    overflow:hidden;
    padding:3px;
    box-sizing:border-box;
  }
  .brand-mark img{
    width:100%;
    height:100%;
    object-fit:contain;
  }
  .brand-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;
    font-size:19px;
    letter-spacing:0.2px;
  }
  .tier-toggle{
    display:flex;
    background:#F0F0F0;
    border-radius:var(--r-md);
    padding:3px;
    font-size:11px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.5px;
  }
  .tier-toggle button{
    border:none;
    background:transparent;
    color:#9CA3AF;
    padding:6px 12px;
    border-radius:var(--r-md);
    cursor:pointer;
    font-family:inherit;
    font-weight:700;
    font-size:11px;
    transition:all .2s ease;
  }
  .tier-toggle button.active{
    background:var(--accent);
    color:#fff;
  }
  .demo-label{
    font-size:9px;
    opacity:0.45;
    text-align:right;
    margin-top:3px;
    letter-spacing:0.4px;
  }

  /* ===== Upgrade banner ===== */
  .upgrade-banner{
    margin-top:12px;
    background:var(--accent);
    border-radius:var(--r-lg);
    padding:10px 12px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
  }
  .upgrade-banner p{
    font-size:12px;
    line-height:1.4;
    color:#fdeadc;
  }
  .upgrade-banner strong{ color:#fff; }
  .upgrade-banner button{
    background:var(--card-bg);
    color:var(--accent);
    border:none;
    border-radius:var(--r-md);
    padding:7px 14px;
    font-weight:800;
    font-size:11px;
    white-space:nowrap;
    cursor:pointer;
    font-family:inherit;
  }

  /* ===== Content ===== */
  .content{
    flex:1;
    overflow-y:auto;
    padding:18px 18px 90px;
  }
  .content::-webkit-scrollbar{width:0;}

  .section-eyebrow{
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--leaf);
    font-weight:700;
    margin-bottom:4px;
  }
  .section-title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:24px;
    font-weight:600;
    color:var(--coffee);
    margin-bottom:16px;
  }

  .kind-filter{
    display:flex;
    gap:6px;
    background:var(--paper-dim);
    border-radius:var(--r-md);
    padding:4px;
    margin-bottom:16px;
  }
  .kind-filter button{
    flex:1;
    border:none;
    background:transparent;
    padding:8px 10px;
    border-radius:var(--r-lg);
    font-family:inherit;
    font-weight:700;
    font-size:12px;
    color:var(--coffee);
    opacity:0.55;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
  }
  .kind-filter button.active{
    background:var(--card-bg);
    opacity:1;
    box-shadow:0 2px 6px rgba(59,42,30,0.12);
  }
  .kind-pill{
    font-size:9.5px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.3px;
    padding:2px 8px;
    border-radius:var(--r-md);
    display:inline-block;
  }
  .kind-pill.food{ background:#FCE4D0; color:var(--accent); }
  .kind-pill.place{ background:#dfe6e0; color:var(--coffee); }

  .search-bar{
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--card-bg);
    border:1.5px solid #D8D8D8;
    border-radius:var(--r-md);
    padding:10px 14px;
    margin-bottom:14px;
  }
  .search-bar input{
    border:none;
    outline:none;
    flex:1;
    font-family:inherit;
    font-size:13px;
    color:var(--coffee);
    background:transparent;
  }
  .search-ic{ font-size:14px; opacity:0.6; }
  .search-clear{
    border:none;
    background:var(--paper-dim);
    width:20px;height:20px;
    border-radius:50%;
    cursor:pointer;
    font-size:10px;
    color:var(--coffee);
  }
  .place-card.external{
    border:1.5px dashed var(--gold);
    background:#fffdf6;
  }
  .source-pill{
    font-size:9.5px;
    color:#6B7280;
    font-weight:700;
  }
  .flag-badge{
    background:#fbe9df;
    color:var(--chili);
    font-size:11px;
    font-weight:700;
    padding:7px 10px;
    border-radius:var(--r-sm);
    margin:8px 0;
  }
  .btn-ghost.flagged{
    background:var(--chili);
    border-color:var(--chili);
    color:#fff;
  }

  /* ===== Cards ===== */
  .place-card{
    background:var(--card-bg);
    border-radius:var(--r-lg);
    padding:14px;
    margin-bottom:14px;
    box-shadow:0 4px 14px rgba(59,42,30,0.08);
    border:1px solid rgba(59,42,30,0.06);
  }
  .place-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:10px;
  }
  .place-photo{
    width:100%;
    height:110px;
    border-radius:var(--r-sm);
    background:var(--accent);
    display:flex;
    align-items:center;
    justify-content:center;
    color:rgba(255,255,255,0.85);
    font-size:28px;
    margin-bottom:10px;
  }
  .place-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:600;
    font-size:16.5px;
    color:var(--coffee);
  }
  .place-meta{
    font-size:11.5px;
    color:#6B7280;
    margin-top:2px;
  }
  .tag-row{
    display:flex;
    gap:6px;
    flex-wrap:wrap;
    margin-top:8px;
  }
  .tag{
    background:var(--paper-dim);
    color:var(--coffee);
    font-size:10.5px;
    font-weight:700;
    padding:3px 9px;
    border-radius:var(--r-md);
  }
  .stars{ color:var(--accent); font-size:13px; letter-spacing:1px; }
  .place-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .btn{
    font-family:inherit;
    font-weight:700;
    font-size:12px;
    border-radius:var(--r-md);
    padding:8px 14px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .btn-primary{ background:var(--accent); color:var(--ink); }
  .btn-ghost{ background:transparent; color:var(--leaf); border:1.5px solid var(--leaf); }
  .btn-locked{ background:#EDEDED; color:#a89a82; cursor:not-allowed; }
  .btn:active{ transform:scale(0.97); }
  .link-btn{
    font-size:11.5px;
    color:var(--leaf);
    text-decoration:underline;
    text-underline-offset:2px;
    background:none;
    border:none;
    cursor:pointer;
    font-family:inherit;
    font-weight:600;
    padding:0;
  }

  /* ===== Cap meter ===== */
  .cap-meter{
    background:var(--card-bg);
    border-radius:var(--r-lg);
    padding:12px 14px;
    margin-bottom:14px;
    border:1px dashed var(--leaf);
  }
  .cap-meter-row{
    display:flex;
    justify-content:space-between;
    font-size:11.5px;
    font-weight:700;
    color:var(--coffee);
    margin-bottom:6px;
  }
  .cap-track{
    height:6px;
    background:var(--paper-dim);
    border-radius:var(--r-sm);
    overflow:hidden;
  }
  .cap-fill{
    height:100%;
    background:var(--accent);
    transition:width .3s ease;
  }
  .cap-fill.full{ background:var(--chili); }

  /* ===== Bottom nav ===== */
  .bottomnav{
    position:absolute;
    bottom:0; left:0; right:0;
    background:var(--chrome);
    display:flex;
    justify-content:space-around;
    padding:10px 6px 14px;
    border-top:1px solid #EEEEEE;
    z-index:2000;
  }
  .navbtn{
    background:none;
    border:none;
    color:#9CA3AF;
    font-family:inherit;
    font-size:10px;
    font-weight:700;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:4px;
    cursor:pointer;
    padding:4px 8px;
  }
  .navbtn .ic{ font-size:18px; }
  .navbtn.active{ color:var(--accent); }

  /* ===== Me tab ===== */
  .profile-head{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:18px;
  }
  .wallpaper-swatch.upload-swatch{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--paper-dim);
    border:2px dashed #B0B0B0;
    font-size:16px;
    color:var(--coffee);
  }
  .section-eyebrow, .section-title{
    text-shadow:0 1px 3px rgba(255,255,255,0.45);
  }
  .style-swatch-row{
    display:flex;
    gap:10px;
    margin-bottom:8px;
    flex-wrap:wrap;
  }
  .style-swatch{
    padding:8px 14px;
    border-radius:var(--r-md);
    font-size:12px;
    font-weight:700;
    cursor:pointer;
    border:2px solid transparent;
    background:var(--paper-dim);
    color:var(--coffee);
  }
  .style-swatch.selected{
    border-color:var(--coffee);
  }
  .wallpaper-row{
    display:flex;
    gap:10px;
    margin-bottom:8px;
    overflow-x:auto;
    padding-bottom:4px;
  }
  .wallpaper-swatch{
    flex-shrink:0;
    width:56px;height:40px;
    border-radius:var(--r-sm);
    cursor:pointer;
    border:2.5px solid transparent;
  }
  .wallpaper-swatch.selected{
    border-color:var(--coffee);
  }
  .sub-label{
    font-size:10.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.4px;
    color:#6B7280;
    margin-bottom:6px;
    margin-top:4px;
  }
  .wallpaper-swatch.reset-swatch{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--paper-dim);
    border:2px dashed #B0B0B0;
    font-size:16px;
    color:var(--coffee);
  }
  .avatar{
    width:68px;height:68px;
    border-radius:50%;
    background:var(--accent);
    display:flex;align-items:center;justify-content:center;
    font-family:'Plus Jakarta Sans',sans-serif;
    font-weight:700;
    font-size:26px;
    color:var(--ink);
    flex-shrink:0;
    position:relative;
    border:3px solid #fff;
    box-shadow:0 3px 10px rgba(0,0,0,0.15);
  }
  .avatar.locked{
    background:#cfc6b3;
    color:#6B7280;
  }
  .avatar-edit{
    position:absolute;
    bottom:-2px; right:-2px;
    width:22px;height:22px;
    background:var(--leaf);
    border-radius:50%;
    border:2px solid #fff;
    display:flex;align-items:center;justify-content:center;
    font-size:11px;
    color:#fff;
    cursor:pointer;
  }
  .profile-name{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:19px;
    font-weight:600;
    color:var(--coffee);
  }
  .profile-tier-badge{
    display:inline-block;
    font-size:10px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.5px;
    padding:2px 9px;
    border-radius:var(--r-md);
    margin-top:4px;
  }
  .badge-guest{ background:#EDEDED; color:#6B7280; }
  .badge-user{ background:var(--accent-dim); color:var(--coffee); }

  .stat-row{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .stat-box{
    flex:1;
    background:var(--card-bg);
    border-radius:var(--r-lg);
    padding:12px 8px;
    text-align:center;
    box-shadow:0 3px 10px rgba(59,42,30,0.06);
  }
  .stat-num{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:20px;
    font-weight:700;
    color:var(--coffee);
  }
  .stat-label{
    font-size:9.5px;
    color:#6B7280;
    text-transform:uppercase;
    letter-spacing:0.4px;
    font-weight:700;
    margin-top:2px;
  }

  /* stamp - signature element */
  .stamp-wrap{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding-bottom:6px;
    margin-bottom:18px;
  }
  .stamp{
    flex-shrink:0;
    width:78px;height:78px;
    border-radius:50%;
    border:2.5px dashed var(--chili);
    display:flex;
    align-items:center;
    justify-content:center;
    flex-direction:column;
    transform:rotate(-7deg);
    color:var(--chili);
    text-align:center;
    background:repeating-radial-gradient(circle, transparent 0 2px, rgba(190,75,51,0.03) 2px 3px);
    opacity:1;
  }
  .stamp.dim{
    border-color:#cfc6b3;
    color:#b5a892;
  }
  .stamp .stamp-ic{ font-size:20px; }
  .stamp .stamp-txt{
    font-size:7.5px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:0.3px;
    margin-top:2px;
    line-height:1.1;
  }

  .theme-row{
    display:flex;
    gap:10px;
    margin-bottom:8px;
  }
  .swatch{
    width:34px;height:34px;
    border-radius:50%;

function requestUserLocation(onDone){

  state.locationStatus = 'locating';
  navigator.geolocation.getCurrentPosition(

      state.locationStatus = 'granted';
      if(onDone) onDone();
    },
    (err)=>{
      state.locationStatus = 'denied';
      if(onDone) onDone();
    },
    { enableHighAccuracy:true, timeout:8000, maximumAge:60000 }
  );
}

/* Distance in km between two lat/lng points (Haversine formula) */
function distanceKm(lat1, lng1, lat2, lng2){
  const R = 6371;
  const dLat = (lat2-lat1) * Math.PI/180;
  const dLng = (lng2-lng1) * Math.PI/180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  const c = 2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  return R * c;
}

function formatDistance(km){

  return km.toFixed(1) + ' km away';

/* Maps a slider value (0-400) to a colour.
   0-360 = rainbow hue at the given saturation/lightness.
   360-400 = grayscale ramp from white to black. */
function hueValueToColor(value, sat, light){
  if(value <= 360){
    return `hsl(${value}, ${sat}%, ${light}%)`;
  }
  const t = (value - 360) / 40;
  const gray = Math.round(100 - t * 100);
  return `hsl(0, 0%, ${gray}%)`;
}

function applyTheme(){
  const hex = hueValueToColor(state.accentHue, 68, 54);
  document.documentElement.style.setProperty('--accent', hex);
  document.documentElement.style.setProperty('--accent-dim', hex.replace('hsl(', 'hsla(').replace(')', ', 0.2)'));
}

  shell.setAttribute('data-edge', effectiveEdge);
  applyFontColor(shell);
  applyWallpaper(shell);
  renderBrandArea();
  const c = document.getElementById('content');
  c.classList.toggle('map-mode', state.tab==='map');
  if(state.tab==='discover') c.innerHTML = renderDiscover();
  if(state.tab==='map') c.innerHTML = renderMap();
  if(state.tab==='diary') c.innerHTML = renderDiary();
  if(state.tab==='people') c.innerHTML = renderPeople();
  if(state.tab==='me') c.innerHTML = renderMe();
}

// render() replaces content.innerHTML wholesale, which destroys and recreates
// any focused <input> — on mobile this drops keyboard focus after every
// keystroke. This wrapper remembers what was focused (and cursor position)
// and restores it immediately after the re-render, so typing stays continuous.
function renderPreservingFocus(){
  const active = document.activeElement;
  const activeId = (active && active.id) ? active.id : null;
  const selStart = (active && typeof active.selectionStart === 'number') ? active.selectionStart : null;
  const selEnd = (active && typeof active.selectionEnd === 'number') ? active.selectionEnd : null;

  render();

  if(activeId){
    const el = document.getElementById(activeId);
    if(el){
      el.focus();
      if(selStart !== null && el.setSelectionRange){
        try { el.setSelectionRange(selStart, selEnd); } catch(e){ /* ignore */ }
      }
    }
  }
}

function applyFontColor(shell){
  if(isGuest()){
    shell.style.removeProperty('--coffee');
    return;
  }
  shell.style.setProperty('--coffee', hueValueToColor(state.fontHue, 42, 26));
}

function applyWallpaper(shell){
  if(isGuest() || state.wallpaper === 'none'){
    shell.style.backgroundImage = '';
    shell.style.background = '';
    return;
  }
  if(state.wallpaper === 'custom' && state.customWallpaperUrl){
    shell.style.background = '';
    shell.style.backgroundImage = `url('${state.customWallpaperUrl}')`;
    shell.style.backgroundSize = 'cover';
    shell.style.backgroundPosition = 'center';
    return;
  }
  if(state.wallpaper === 'solid'){
    const lightness = state.bgLightMode === 'dark' ? 22 : 88;
    shell.style.backgroundImage = '';
    shell.style.background = hueValueToColor(state.bgHue, 55, lightness);
    return;
  }
  const preset = WALLPAPERS.find(w=>w.id===state.wallpaper);
  if(preset && preset.css){
    shell.style.backgroundImage = '';
    shell.style.background = preset.css;
  }
}

function renderDiscover(){
  const cap = isGuest() ? CAPS.guest.saves : Infinity;
  const used = state.savedPlaces.length;
  let html = `<div class="section-eyebrow">Browse by</div><div class="section-title">Discover</div>`;

  html += `
    <div class="search-bar">
      <span class="search-ic">🔎</span>
      <input id="searchInput" placeholder="Search any place or food spot..." value="${state.searchQuery}" oninput="onSearchInput(this.value)">
      ${state.searchQuery ? `<button class="search-clear" onclick="onSearchInput('')">✕</button>` : ''}
    </div>`;

  if(state.searchQuery.trim().length > 0){
    html += renderSearchResults(state.searchQuery);
    return html;
  }

  html += `
    <div class="kind-filter">
      <button class="${state.discoverFilter==='all'?'active':''}" onclick="setDiscoverFilter('all')">All</button>
      <button class="${state.discoverFilter==='food'?'active':''}" onclick="setDiscoverFilter('food')">🍜 Food</button>
      <button class="${state.discoverFilter==='place'?'active':''}" onclick="setDiscoverFilter('place')">📍 Places</button>
    </div>`;

  html += `<button class="nearby-toggle ${state.nearbyMode?'active':''}" onclick="toggleNearbyMode()">📍 ${state.nearbyMode ? 'Showing nearest first' : 'Search around me'}</button>`;

  html += `<button class="people-add-toggle" style="background:var(--paper-dim);color:var(--coffee);" onclick="toggleDiscoverFilters()">⚙ ${state.discoverFiltersOpen ? 'Hide filters' : 'Rating & sort'}</button>`;

  if(state.discoverFiltersOpen){
    html += `
      <p class="sub-label">Minimum rating</p>
      <div class="kind-filter" style="margin-bottom:10px;">
        <button class="${state.minRating===0?'active':''}" onclick="setMinRating(0)">All</button>
        <button class="${state.minRating===4?'active':''}" onclick="setMinRating(4)">4★+</button>
        <button class="${state.minRating===4.5?'active':''}" onclick="setMinRating(4.5)">4.5★+</button>
      </div>
      <div class="kind-filter" style="margin-bottom:10px;">
        <button class="${state.minRating===3?'active':''}" onclick="setMinRating(3)">3★+</button>
        <button class="${state.minRating===3.5?'active':''}" onclick="setMinRating(3.5)">3.5★+</button>
        <button class="${state.minRating===5?'active':''}" onclick="setMinRating(5)">5★</button>
      </div>
      <p class="sub-label">Sort by</p>
      <div class="kind-filter" style="margin-bottom:14px;">
        <button class="${state.sortBy==='recommended'?'active':''}" onclick="setSortBy('recommended')">Recommended</button>
        <button class="${state.sortBy==='rating'?'active':''}" onclick="setSortBy('rating')">Top Rated</button>
      </div>`;
  }

  if(isGuest()){
    const pct = Math.min(100, (used/cap)*100);
    html += `
      <div class="cap-meter">
        <div class="cap-meter-row"><span>Saved spots</span><span>${used} / ${cap}</span></div>
        <div class="cap-track"><div class="cap-fill ${used>=cap?'full':''}" style="width:${pct}%"></div></div>
      </div>`;
  }

  let filtered = PLACES.filter(p=> (state.discoverFilter==='all' || p.kind===state.discoverFilter) && p.rating >= state.minRating);

  if(state.nearbyMode && state.userLocation){
    filtered = filtered.slice().sort((a,b)=>
      distanceKm(state.userLocation.lat, state.userLocation.lng, a.lat, a.lng) -
      distanceKm(state.userLocation.lat, state.userLocation.lng, b.lat, b.lng)
    );
  } else if(state.sortBy === 'rating'){
    filtered = filtered.slice().sort((a,b)=> b.rating - a.rating);
  }

  if(filtered.length===0){
    html += `<div class="empty-note">No ${state.discoverFilter==='all'?'':state.discoverFilter+' '}spots match these filters.</div>`;
  }

  filtered.forEach(p=> html += placeCardHtml(p));
  return html;
}

function placeCardHtml(p){
  const cap = isGuest() ? CAPS.guest.saves : Infinity;
  const used = state.savedPlaces.length;
  const saved = state.savedPlaces.includes(p.id);
  let saveBtn;
  if(saved){
    saveBtn = `<button class="btn btn-ghost" onclick="toggleSave('${p.id}')">✓ Saved</button>`;
  } else if(isGuest() && used>=cap){
    saveBtn = `<button class="btn btn-locked" onclick="capToast('save')">🔒 Cap reached</button>`;
  } else {
    saveBtn = `<button class="btn btn-primary" onclick="toggleSave('${p.id}')">+ Save</button>`;
  }
  let distPill = '';
  if(state.userLocation){
    const d = distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng);
    distPill = `<span class="distance-pill">${formatDistance(d)}</span>`;
  }
  return `
      <div class="place-card">
        <div class="place-photo">${p.icon}</div>
        <div class="place-top">
          <div>
            <span class="kind-pill ${p.kind}">${p.kind==='food'?'Food':'Place'}</span>${distPill}
            <div class="place-name">${p.name}</div>
            <div class="place-meta">${p.area} · ${p.cat}</div>
          </div>
          <div class="stars">${'★'.repeat(Math.round(p.rating))}${'☆'.repeat(5-Math.round(p.rating))}</div>
        </div>
        <div class="tag-row">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>
        ${flagBadge(p)}
        <div class="place-actions">
          ${saveBtn}
          <button class="btn btn-ghost" onclick="setTab('diary')">📓 Diary</button>
          ${linkButton(p)}
        </div>
        <div class="place-actions" style="margin-top:6px;">
          ${flagButton(p)}
        </div>
      </div>`;
}

function toggleNearbyMode(){
  if(!state.nearbyMode && !state.userLocation){
    toast('Finding your location…');
    requestUserLocation(()=>{
      if(state.locationStatus === 'granted'){
        state.nearbyMode = true;
        toast('Showing places nearest to you first.');
      } else if(state.locationStatus === 'denied'){
        toast('Location permission denied — enable it in your browser settings to use this.');
      } else {
        toast('Location unavailable on this device.');
      }
      render();
    });
    return;
  }
  state.nearbyMode = !state.nearbyMode;
  render();
}

function onSearchInput(val){
  state.searchQuery = val;
  renderPreservingFocus();
}

function renderSearchResults(query){
  const q = query.toLowerCase();
  const own = PLACES.filter(p => p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q));
  const external = EXTERNAL_RESULTS.filter(p =>
    (p.name.toLowerCase().includes(q) || p.cat.toLowerCase().includes(q)) &&
    !PLACES.some(op => op.name.toLowerCase() === p.name.toLowerCase())
  );

  let html = '';

  if(own.length > 0){
    html += `<div class="section-eyebrow" style="margin-top:4px;">Already on biteScout</div>`;
    own.forEach(p=>{
      const saved = state.savedPlaces.includes(p.id);
      let distPill = '';
      if(state.userLocation){
        const d = distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng);
        distPill = `<span class="distance-pill">${formatDistance(d)}</span>`;
      }
      html += `
        <div class="place-card">
          <div class="place-top">
            <div>
              <span class="kind-pill ${p.kind}">${p.kind==='food'?'Food':'Place'}</span>${distPill}
              <div class="place-name">${p.name}</div>
              <div class="place-meta">${p.area} · ${p.cat}</div>
            </div>
            <div class="stars">${'★'.repeat(Math.round(p.rating))}</div>
          </div>
          <div class="place-actions">
            ${saved
              ? `<button class="btn btn-ghost">✓ Saved</button>`
              : `<button class="btn btn-primary" onclick="toggleSave('${p.id}')">+ Save</button>`}
          </div>
          ${flagBadge(p)}
          <div class="place-actions" style="margin-top:6px;">
            ${flagButton(p)}
          </div>
        </div>`;
    });
  }

  if(external.length > 0){
    html += `<div class="section-eyebrow" style="margin-top:14px;">Found via Google Maps (simulated)</div>`;
    external.forEach(p=>{
      let distPill = '';
      if(state.userLocation){
        const d = distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng);
        distPill = `<span class="distance-pill">${formatDistance(d)}</span>`;
      }
      html += `
        <div class="place-card external">
          <div class="place-top">
            <div>
              <span class="kind-pill ${p.kind}">${p.kind==='food'?'Food':'Place'}</span> <span class="source-pill">via ${p.source}</span>${distPill}
              <div class="place-name">${p.icon} ${p.name}</div>
              <div class="place-meta">${p.area} · ${p.cat}</div>
            </div>
            <div class="stars">${'★'.repeat(Math.round(p.rating))}</div>
          </div>
          <p style="font-size:11.5px;color:#6B7280;margin:6px 0 10px;">Not yet on biteScout — went here and think it's worth logging?</p>
          <div class="place-actions">
            <button class="btn btn-primary" onclick="addExternalPlace('${p.ext_id}')">+ Add to biteScout</button>
          </div>
        </div>`;
    });
  }

  if(own.length===0 && external.length===0){
    html += `<div class="empty-note">No matches for "${query}" — try a different search.</div>`;
  }

  return html;
}

function addExternalPlace(extId){
  const cap = isGuest() ? CAPS.guest.saves : Infinity;
  if(state.savedPlaces.length >= cap){ capToast('save'); return; }
  const ext = EXTERNAL_RESULTS.find(p=>p.ext_id===extId);
  if(!ext) return;
  const newId = 'user-added-' + ext.ext_id;
  if(!PLACES.some(p=>p.id===newId)){
    PLACES.push({
      id:newId, name:ext.name, area:ext.area, cat:ext.cat, kind:ext.kind,
      icon:ext.icon, rating:ext.rating, tags:['New on biteScout'], link:null,
      lat:ext.lat, lng:ext.lng
    });
  }
  state.savedPlaces.push(newId);
  state.searchQuery = '';
  toast(`${ext.name} added to biteScout and saved to your diary.`);
  setTab('diary');
}

function setDiscoverFilter(f){
  state.discoverFilter = f;

}

function flagBadge(p){
  const count = state.flagCounts[p.id] || 0;
  if(count === 0) return '';
  return `<div class="flag-badge">⚠️ ${count} report${count>1?'s':''} — being verified by the community</div>`;
}

function flagButton(p){
  const flagged = state.flaggedByMe.includes(p.id);
  if(flagged){
    return `<button class="btn btn-ghost flagged" onclick="flagPlace('${p.id}')">🚩 Reported</button>`;
  }
  return `<button class="btn btn-ghost" onclick="flagPlace('${p.id}')">🚩 Closed/Moved?</button>`;
}

function flagPlace(id){
  const flagged = state.flaggedByMe.includes(id);
  if(flagged){
    state.flaggedByMe = state.flaggedByMe.filter(x=>x!==id);
    state.flagCounts[id] = Math.max(0, (state.flagCounts[id]||0) - 1);
    toast('Report withdrawn.');
  } else {
    state.flaggedByMe.push(id);
    state.flagCounts[id] = (state.flagCounts[id]||0) + 1;
    toast('Thanks — flagged for the community to verify. This keeps biteScout accurate.');
  }
  render();
}

function linkButton(p){
  if(p.link){
    return `<button class="link-btn" onclick="window.open('${p.link}','_blank')">Official site ↗</button>`;
  }
  return `<button class="link-btn" onclick="window.open('https://www.google.com/search?q=${encodeURIComponent(p.name+' '+p.area)}','_blank')">Search ↗</button>`;
}

function toggleSave(id){
  const cap = isGuest() ? CAPS.guest.saves : Infinity;
  if(state.savedPlaces.includes(id)){
    state.savedPlaces = state.savedPlaces.filter(x=>x!==id);
  } else {
    if(state.savedPlaces.length >= cap){ capToast('save'); return; }
    state.savedPlaces.push(id);
  }
  render();
}

function capToast(kind){
  if(kind==='save') toast(`Guest limit reached (${CAPS.guest.saves} spots). Upgrade to save unlimited places.`);
  if(kind==='connect') toast(`Guest limit reached (${CAPS.guest.connections} connections). Upgrade to connect with more people.`);
  if(kind==='photo') toast(`Photo uploads are a User feature. Upgrade to add photos to your diary.`);
  if(kind==='avatar') toast(`Profile pictures are a User feature. Upgrade to personalize your avatar.`);
  if(kind==='comment') toast(`Guests can only reply within their ${CAPS.guest.connections} connections.`);
  if(kind==='customize') toast(`Design style & wallpaper are User-only. Upgrade to fully restyle your profile.`);
}

function renderMap(){

  const savedList = savedAll
    .filter(p=> state.mapFilter==='all' || p.kind===state.mapFilter)
    .filter(p=> state.mapSort==='recommended' || p.rating >= state.mapSort);

  if(!state.userLocation && !state.hasAttemptedAutoLocate){
    state.hasAttemptedAutoLocate = true;
    requestUserLocation(()=>{
      state.mapView = null; // let it recenter on the freshly-found location
      render();
    });
  }

  let locNote = '';
  if(state.locationStatus === 'locating') locNote = 'Finding your location…';
  else if(state.locationStatus === 'denied') locNote = 'Location denied — tap 📍 to retry.';
  else if(state.locationStatus === 'unavailable') locNote = 'Location unavailable on this device.';
  else if(state.locationStatus === 'granted') locNote = 'Tap any pin for directions.';
  else locNote = 'Tap 📍 to find your real location.';

  const sortOptions = [
    {val:'recommended', label:'Recommended'},
    {val:3, label:'3★+'},
    {val:3.5, label:'3.5★+'},
    {val:4, label:'4★+'},
    {val:4.5, label:'4.5★+'},
    {val:5, label:'5★'},
  ];

  let html = `
    <div class="map-page">
      <div class="leaflet-map-container">
        <div id="leafletMap" style="width:100%;height:100%;"></div>
      </div>

      <div class="map-floating-filter">
        <button class="${state.mapFilter==='all'?'active':''}" onclick="setMapFilter('all')">All</button>
        <button class="${state.mapFilter==='food'?'active':''}" onclick="setMapFilter('food')">🍜 Food</button>
        <button class="${state.mapFilter==='place'?'active':''}" onclick="setMapFilter('place')">📍 Places</button>
      </div>

      <div class="map-floating-sort">
        ${sortOptions.map(o=>`<button class="${state.mapSort===o.val?'active':''}" onclick="setMapSort('${o.val}')">${o.label}</button>`).join('')}
      </div>

      ${isGuest() ? `<div class="cap-meter"><div class="cap-meter-row"><span>Saved on map</span><span>${state.savedPlaces.length} / ${CAPS.guest.saves}</span></div><div class="cap-track"><div class="cap-fill" style="width:${Math.min(100,(state.savedPlaces.length/CAPS.guest.saves)*100)}%"></div></div></div>` : ''}

      <button class="locate-btn" onclick="onLocateMeClick()" title="Find my location">📍</button>

      <div class="map-floating-bottom">
        <span class="legend-dot" style="background:#FFA726"></span>Food &nbsp;
        <span class="legend-dot" style="background:#F0A824"></span>Place &nbsp;·&nbsp; ${locNote}
      </div>
    </div>`;

  // Defer Leaflet init until after this HTML is actually in the DOM
  setTimeout(()=> initLeafletMap(savedList), 0);

  return html;
}

function initLeafletMap(savedList){
  const container = document.getElementById('leafletMap');
  if(!container || typeof L === 'undefined') return;

  // Determine center: preserve last view > user location > Melaka default
  const defaultCenter = [2.1896, 102.2501]; // Melaka town, where most seed places are
  let center = state.mapView ? state.mapView.center : (state.userLocation ? [state.userLocation.lat, state.userLocation.lng] : defaultCenter);
  let zoom = state.mapView ? state.mapView.zoom : (state.userLocation ? 14 : 12);

  leafletMap = L.map('leafletMap', { zoomControl:false }).setView(center, zoom);
  L.control.zoom({ position:'bottomleft' }).addTo(leafletMap);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(leafletMap);

  leafletMap.on('moveend', ()=>{
    const c = leafletMap.getCenter();
    state.mapView = { center: [c.lat, c.lng], zoom: leafletMap.getZoom() };
  });

  // "You are here" marker
  if(state.userLocation){
    L.circleMarker([state.userLocation.lat, state.userLocation.lng], {
      radius: 8, fillColor:'#3E6E8E', fillOpacity:1, color:'#fff', weight:3
    }).addTo(leafletMap).bindPopup('You are here');
  }

  // Place markers
  savedList.forEach(p=>{
    const color = p.kind==='food' ? '#FFA726' : '#F0A824';
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 9, fillColor: color, fillOpacity: 1, color:'#0D4D4D', weight:2
    }).addTo(leafletMap);

    let distText = '';
    if(state.userLocation){
      const d = distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng);
      distText = `<div class="pp-dist">${formatDistance(d)}</div>`;
    }

    const popupHtml = `
      <div class="place-popup">
        <div class="pp-name">${p.icon} ${p.name}</div>
        ${distText}
        <div class="pp-actions">
          <a class="pp-btn nav" href="${googleMapsDirectionsUrl(p.lat,p.lng)}" target="_blank" rel="noopener">🧭 Navigate</a>
          <button class="pp-btn diary" onclick="setTab('diary')">📓 Diary</button>
        </div>
      </div>`;
    marker.bindPopup(popupHtml);

    if(state.focusPlaceId === p.id){
      setTimeout(()=> marker.openPopup(), 300);
    }
  });

  state.focusPlaceId = null; // consume it so it doesn't reopen on later re-renders
}

function onLocateMeClick(){

    render();
  });
}

function renderPeople(){
  const cap = isGuest() ? CAPS.guest.connections : Infinity;
  const used = state.connections.length;
  let html = `<div class="section-eyebrow">Your circle</div><div class="section-title">People</div>`;

  html += `<button class="people-add-toggle" onclick="togglePeopleSearch()">${state.peopleSearchOpen ? '✕ Close search' : '＋ Find people'}</button>`;

  if(state.peopleSearchOpen){
    html += `
      <div class="search-bar" style="margin-top:10px;">
        <span class="search-ic">🔎</span>
        <input id="peopleSearchInput" placeholder="Search by name..." value="${state.peopleSearchQuery}" oninput="onPeopleSearchInput(this.value)">
        ${state.peopleSearchQuery ? `<button class="search-clear" onclick="onPeopleSearchInput('')">✕</button>` : ''}
      </div>`;

    const q = state.peopleSearchQuery.trim().toLowerCase();
    if(q.length > 0){
      const matches = PEOPLE.filter(p=>p.name.toLowerCase().includes(q));
      html += `<div class="section-eyebrow" style="margin-top:14px;">Search results</div>`;
      if(matches.length===0){
        html += `<div class="empty-note">No one found matching "${state.peopleSearchQuery}".</div>`;
      } else {
        matches.forEach(p=> html += personRowHtml(p, cap, used));
      }
      return html;
    }
  }

  html += `
    <div class="kind-filter" style="margin-top:2px;">
      <button class="${state.peopleFilter==='all'?'active':''}" onclick="setPeopleFilter('all')">All</button>
      <button class="${state.peopleFilter==='friend'?'active':''}" onclick="setPeopleFilter('friend')">Friends</button>
      <button class="${state.peopleFilter==='user'?'active':''}" onclick="setPeopleFilter('user')">Users</button>
      <button class="${state.peopleFilter==='influencer'?'active':''}" onclick="setPeopleFilter('influencer')">Influencer</button>
    </div>`;

  const filteredPeople = PEOPLE.filter(p => state.peopleFilter==='all' || p.type===state.peopleFilter);

  // Simulated "People Near You" using real device GPS + mock people locations.
  // Real proximity discovery across real users needs a backend — this shows the UX now.
  if(state.userLocation){
    const nearby = filteredPeople
      .map(p=>({ ...p, dist: distanceKm(state.userLocation.lat, state.userLocation.lng, p.lat, p.lng) }))
      .sort((a,b)=>a.dist-b.dist);
    html += `<div class="section-eyebrow" style="margin-top:6px;">📍 People near you</div>`;
    if(nearby.length===0) html += `<div class="empty-note">No one in this category yet.</div>`;
    nearby.forEach(p=> html += personRowHtml(p, cap, used, formatDistance(p.dist)));
    html += `<div class="section-eyebrow" style="margin-top:16px;">Everyone</div>`;
  }

  if(filteredPeople.length===0){
    html += `<div class="empty-note">No one in this category yet.</div>`;
  }
  filteredPeople.forEach(p=> html += personRowHtml(p, cap, used));
  return html;
}

function personRowHtml(p, cap, used, distLabel){
  const connected = state.connections.includes(p.id);
  const blocked = state.blocked.includes(p.id);
  let actionBtn;
  if(blocked){
    actionBtn = `<button class="icon-btn" onclick="toggleBlock('${p.id}')" title="Unblock">🚫</button>`;
  } else if(connected){
    actionBtn = `<button class="icon-btn" onclick="toggleConnect('${p.id}')" title="Remove">✓</button>`;
  } else if(isGuest() && used>=cap){
    actionBtn = `<button class="icon-btn" onclick="capToast('connect')" title="Locked">🔒</button>`;
  } else {
    actionBtn = `<button class="icon-btn" onclick="toggleConnect('${p.id}')" title="Add">＋</button>`;
  }
  return `
    <div class="person-row">
      <div class="person-avatar" style="background:${p.color}">${p.name[0]}</div>
      <div class="person-info">
        <div class="person-name">${p.name}</div>
        <div class="person-badge">${p.badge} · ${p.visits} visits${distLabel ? ' · '+distLabel : ''}</div>
      </div>
      <div class="person-actions">
        ${actionBtn}
        ${!blocked ? `<button class="icon-btn" onclick="toggleBlock('${p.id}')" title="Block">⛔</button>` : ''}
      </div>
    </div>`;
}

function setPeopleFilter(f){

function togglePeopleSearch(){

function toggleConnect(id){
  const cap = isGuest() ? CAPS.guest.connections : Infinity;
  if(state.connections.includes(id)){
    state.connections = state.connections.filter(x=>x!==id);
  } else {
    if(state.connections.length >= cap){ capToast('connect'); return; }
    state.connections.push(id);
  }
  render();
}

function toggleBlock(id){
  if(state.blocked.includes(id)){
    state.blocked = state.blocked.filter(x=>x!==id);
    toast('Unblocked.');
  } else {
    state.blocked.push(id);
    state.connections = state.connections.filter(x=>x!==id);
    toast('Blocked. They will no longer appear in your circle.');
  }
  render();
}

function handleWallpaperUpload(event){
  if(isGuest()){ capToast('customize'); return; }
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    const img = new Image();
    img.onload = function(){
      const canvas = document.createElement('canvas');
      const targetW = 600, targetH = 220;
      canvas.width = targetW; canvas.height = targetH;
      const ctx = canvas.getContext('2d');
      const scale = Math.max(targetW/img.width, targetH/img.height);
      const w = img.width*scale, h = img.height*scale;
      ctx.drawImage(img, (targetW-w)/2, (targetH-h)/2, w, h);
      state.customWallpaperUrl = canvas.toDataURL('image/jpeg', 0.85);
      state.wallpaper = 'custom';
      render();
      toast('Wallpaper photo uploaded and applied.');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function renderOnboardingSlide(){
  const area = document.getElementById('onboardingSlideArea');
  const dotsEl = document.getElementById('onboardingDots');
  const nextBtn = document.getElementById('onboardingNextBtn');
  if(!area) return;

  const i = state.onboardingIndex;
  const slide = ONBOARDING_SLIDES[i];

  area.innerHTML = `
    <div class="onboarding-icon">${slide.icon}</div>
    <div class="onboarding-headline">${slide.headline}</div>
    <div class="onboarding-body">${slide.body}</div>`;

  dotsEl.innerHTML = ONBOARDING_SLIDES.map((_, idx)=>
    `<div class="onboarding-dot ${idx===i?'active':''}" onclick="goToOnboardingSlide(${idx})"></div>`
  ).join('');

  nextBtn.textContent = (i === ONBOARDING_SLIDES.length - 1) ? 'Get Started' : 'Next';
}

function onboardingNext(){
  if(state.onboardingIndex < ONBOARDING_SLIDES.length - 1){
    state.onboardingIndex++;
    renderOnboardingSlide();
  } else {
    finishOnboarding();
  }
}

function goToOnboardingSlide(idx){
  state.onboardingIndex = idx;
  renderOnboardingSlide();
}

function finishOnboarding(){
  const onboarding = document.getElementById('onboardingScreen');
  if(onboarding){
    onboarding.classList.add('hide');
    setTimeout(()=> onboarding.remove(), 400);
  }
}

function setupOnboardingSwipe(){
  const el = document.getElementById('onboardingScreen');
  if(!el) return;
  let startX = null;
  el.addEventListener('touchstart', (e)=>{ startX = e.touches[0].clientX; }, {passive:true});
  el.addEventListener('touchend', (e)=>{
    if(startX === null) return;
    const deltaX = e.changedTouches[0].clientX - startX;
    if(Math.abs(deltaX) > 50){
      if(deltaX < 0 && state.onboardingIndex < ONBOARDING_SLIDES.length - 1){
        state.onboardingIndex++; renderOnboardingSlide();
      } else if(deltaX > 0 && state.onboardingIndex > 0){
        state.onboardingIndex--; renderOnboardingSlide();
      }
    }
    startX = null;
  }, {passive:true});
}
